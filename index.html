<!DOCTYPE html>
<html>
<head>
    <title>Mi Anime</title>
</head>
<body>
    <h1>Buscar Anime</h1>
    <input type="text" id="searchInput" placeholder="Ej: Naruto">
    <button onclick="searchAnime()">Buscar</button>
    <div id="results"></div>

    <script>
        const API_URL = "https://consumet-api.vercel.app"; // <-- TU URL

        async function searchAnime() {
            const query = document.getElementById('searchInput').value;
            const response = await fetch(`${API_URL}/meta/anilist/${query}`);
            const data = await response.json();
            
            // Mostrar resultados en pantalla
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = data.results.map(anime => `
                <div>
                    <h3>${anime.title.romaji}</h3>
                    <img src="${anime.image}" width="100">
                    <button onclick="watchAnime('${anime.id}')">Ver</button>
                </div>
            `).join('');
        }

        async function watchAnime(id) {
            // Obtener enlaces del episodio 1
            const response = await fetch(`${API_URL}/meta/anilist/episodes/${id}`);
            const data = await response.json();
            const episode = data.episodes[0];
            // Aquí usarías un reproductor (video.js, hls.js) con episode.url
            alert(`Reproduciendo: ${episode.title}\nURL: ${episode.url}`);
        }
    </script>
</body>
</html>
