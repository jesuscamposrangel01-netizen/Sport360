<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎬 Anime Finder Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            padding: 16px;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e50914, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .logo span {
            -webkit-text-fill-color: #888;
            font-weight: 300;
            font-size: 0.8rem;
            margin-left: 8px;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 4px 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 280px;
            transition: 0.3s;
        }
        .search-box:focus-within {
            border-color: #e50914;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.2);
        }
        .search-box input {
            background: transparent;
            border: none;
            padding: 12px 0;
            color: #fff;
            font-size: 0.95rem;
            width: 100%;
            outline: none;
        }
        .search-box input::placeholder {
            color: #888;
        }
        .search-box .icon {
            color: #666;
            margin-right: 10px;
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .tab {
            background: none;
            border: none;
            color: #888;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 0;
            transition: 0.3s;
            position: relative;
        }
        .tab:hover {
            color: #fff;
        }
        .tab.active {
            color: #fff;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -13px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #e50914;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
        }

        /* FILTROS (más compactos) */
        .filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            align-items: center;
        }
        .filter-label {
            color: #888;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 4px;
        }
        .filter-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #aaa;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 3px 14px;
            border-radius: 30px;
            transition: 0.3s;
        }
        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .filter-btn.active {
            background: #e50914;
            border-color: #e50914;
            color: #fff;
        }

        /* SECCIÓN TÍTULO */
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 24px 0 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .section-title .badge {
            font-size: 0.7rem;
            background: #e50914;
            padding: 2px 14px;
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
        }
        .section-title .btn-back {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #aaa;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .section-title .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .result-count {
            color: #888;
            font-size: 0.9rem;
            font-weight: 400;
            margin-left: 8px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
            border-color: rgba(229, 9, 20, 0.3);
        }
        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }
        .card .info {
            padding: 12px 14px 14px;
        }
        .card .info h4 {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card .info p {
            color: #f5c518;
            font-size: 0.8rem;
            margin-top: 4px;
        }

        /* BOTÓN CARGAR MÁS */
        .btn-cargar {
            background: linear-gradient(135deg, #e50914, #b20710);
            border: none;
            color: #fff;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin: 24px auto 0;
            display: block;
            width: 100%;
            max-width: 320px;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(229, 9, 20, 0.3);
        }
        .btn-cargar:active {
            transform: scale(0.96);
        }
        .btn-cargar:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-cargar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(229, 9, 20, 0.5);
        }

        /* TEMPORADAS (estilo de la captura) */
        .temporadas {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0 18px;
        }
        .temp-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #aaa;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .temp-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .temp-btn.active {
            background: #e50914;
            border-color: #e50914;
            color: #fff;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.3);
        }

        /* EPISODIOS (numerados, estilo captura) */
        .episodios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
            margin-top: 8px;
        }
        .ep-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 14px 6px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: 0.25s;
        }
        .ep-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #e50914;
            transform: scale(1.05);
        }
        .ep-card .num {
            font-size: 1.4rem;
            font-weight: 800;
            color: #e50914;
        }
        .ep-card .title {
            font-size: 0.65rem;
            color: #888;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* REPRODUCTOR */
        .reproductor {
            display: none;
            margin-top: 30px;
            background: #0d0d0d;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .reproductor.active {
            display: block;
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            background: #111;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .btn-volver {
            background: none;
            border: none;
            color: #e50914;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .player-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .player-controls select {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            outline: none;
        }
        .player-controls button {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ccc;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .player-controls button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .player-video {
            width: 100%;
            height: 55vh;
            background: #000;
            position: relative;
        }
        .player-video iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            background: rgba(0, 0, 0, 0.7);
            padding: 18px 28px;
            border-radius: 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
            max-width: 90%;
        }
        .loading .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 8px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .player-footer {
            padding: 14px 20px;
            background: #111;
            border-top: 1px solid #1a1a1a;
        }
        .player-footer h3 {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .player-footer p {
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 4px;
            line-height: 1.4;
        }
        .fuente-info {
            color: #0f0;
            font-size: 0.75rem;
            margin-top: 6px;
        }
        .error-msg {
            color: #e50914;
            text-align: center;
            padding: 16px;
            background: rgba(229, 9, 20, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(229, 9, 20, 0.15);
            margin: 12px 0;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 12px;
            }
            .episodios-grid {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
                gap: 8px;
            }
            .logo {
                font-size: 1.6rem;
            }
            .search-box {
                max-width: 180px;
            }
            .tabs {
                gap: 16px;
            }
            .player-video {
                height: 40vh;
            }
            .section-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">🎬 Anime Finder <span>| Pro</span></div>
        <div class="search-box">
            <span class="icon">🔍</span>
            <input id="buscador" type="text" placeholder="Buscar anime...">
        </div>
    </div>

    <div class="tabs" id="tabsContainer">
        <button class="tab active" data-tab="tv">Series</button>
        <button class="tab" data-tab="anime">Anime</button>
    </div>

    <div class="filter-row">
        <span class="filter-label">🎭 Género</span>
        <button class="filter-btn active" data-genre="all">Recomendados</button>
        <button class="filter-btn" data-genre="28">Acción</button>
        <button class="filter-btn" data-genre="35">Comedia</button>
        <button class="filter-btn" data-genre="18">Drama</button>
        <button class="filter-btn" data-genre="16">Animación</button>
        <button class="filter-btn" data-genre="10751">Niños</button>
    </div>

    <div class="filter-row">
        <span class="filter-label">📅 Año</span>
        <button class="filter-btn active" data-year="all">Todo</button>
        <button class="filter-btn" data-year="2026">2026</button>
        <button class="filter-btn" data-year="2025">2025</button>
        <button class="filter-btn" data-year="2024">2024</button>
    </div>

    <div class="section-title" id="tituloSeccion">
        📌 Series Populares <span class="badge">Top</span>
        <button class="btn-back" id="btnVolver" style="display:none;">← Volver</button>
    </div>

    <div id="grid" class="grid"></div>
    <button class="btn-cargar" id="btnCargarMas">Cargar más</button>

    <!-- Contenedor de temporadas y episodios -->
    <div id="contenedorEpisodios" style="display:none;">
        <div class="section-title" style="margin-top:10px;">
            📺 <span id="serieTitulo"></span>
            <span class="badge" id="serieAno"></span>
        </div>
        <div class="temporadas" id="temporadasContainer"></div>
        <div class="episodios-grid" id="episodiosGrid"></div>
    </div>

    <!-- REPRODUCTOR -->
    <div id="reproductor" class="reproductor">
        <div class="player-header">
            <button class="btn-volver" id="btnCerrarReproductor">← Volver</button>
            <div class="player-controls">
                <span style="color:#e50914;font-weight:600;font-size:0.7rem;">HD</span>
                <select id="sourceSelector">
                    <option value="inteligente">🤖 Auto</option>
                    <option value="vidsrc.in">vidsrc.in</option>
                    <option value="embed.su">embed.su</option>
                    <option value="vidsrc.xyz">vidsrc.xyz</option>
                    <option value="vidsrc.cc">vidsrc.cc</option>
                    <option value="vidsrc.vip">vidsrc.vip</option>
                </select>
                <button id="btnRecargar">🔄 Recargar</button>
            </div>
        </div>
        <div class="player-video">
            <div class="loading" id="loadingVideo">
                <div class="spinner"></div>
                <span id="loadingText">Cargando...</span>
            </div>
            <iframe id="iframeVideo" src="" allowfullscreen></iframe>
        </div>
        <div class="player-footer">
            <h3 id="peliTitulo">Título</h3>
            <p id="peliSinopsis">Sinopsis...</p>
            <div class="fuente-info" id="fuenteInfo"></div>
        </div>
    </div>

    <script>
        // ================================================================
        // CONFIGURACIÓN
        // ================================================================
        const API_KEY = 'bda7a5fa2507ebcef3fcebd2287d72c9';
        const BASE_IMG = 'https://image.tmdb.org/t/p/w300';
        const DOMINIOS = ['vidsrc.in', 'embed.su', 'vidsrc.xyz', 'vidsrc.cc', 'vidsrc.vip'];

        // DOM
        const grid = document.getElementById('grid');
        const btnCargarMas = document.getElementById('btnCargarMas');
        const buscador = document.getElementById('buscador');
        const tituloSeccion = document.getElementById('tituloSeccion');
        const btnVolver = document.getElementById('btnVolver');
        const contenedorEpisodios = document.getElementById('contenedorEpisodios');
        const temporadasContainer = document.getElementById('temporadasContainer');
        const episodiosGrid = document.getElementById('episodiosGrid');
        const serieTitulo = document.getElementById('serieTitulo');
        const serieAno = document.getElementById('serieAno');
        const reproductor = document.getElementById('reproductor');
        const iframe = document.getElementById('iframeVideo');
        const loadingVideo = document.getElementById('loadingVideo');
        const loadingText = document.getElementById('loadingText');
        const peliTitulo = document.getElementById('peliTitulo');
        const peliSinopsis = document.getElementById('peliSinopsis');
        const fuenteInfo = document.getElementById('fuenteInfo');
        const sourceSelector = document.getElementById('sourceSelector');
        const btnRecargar = document.getElementById('btnRecargar');

        let allSeries = [];
        let currentPage = 1;
        let currentTipo = 'tv';
        let modoBusqueda = false;
        let currentSerieId = null;
        let currentSeason = null;
        let currentEpisode = null;
        let currentSerieData = null;
        let currentYear = 'all';
        let currentGenre = 'all';
        const MAX_PAGES = 5;

        // ================================================================
        // API
        // ================================================================
        async function fetchApi(endpoint, extra = '') {
            let url = `https://api.themoviedb.org/3/${endpoint}?api_key=${API_KEY}&language=es-MX`;
            if (extra) url += `&${extra}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Error ${res.status}`);
            return res.json();
        }

        // ================================================================
        // BUSCAR
        // ================================================================
        async function buscar(query) {
            if (!query.trim()) {
                modoBusqueda = false;
                tituloSeccion.innerHTML = `📌 ${currentTipo === 'tv' ? 'Series' : 'Animes'} Populares <span class="badge">Top</span>`;
                btnCargarMas.style.display = 'block';
                contenedorEpisodios.style.display = 'none';
                grid.style.display = 'grid';
                btnVolver.style.display = 'none';
                await cargarPagina(1);
                return;
            }

            modoBusqueda = true;
            btnCargarMas.style.display = 'none';
            contenedorEpisodios.style.display = 'none';
            grid.style.display = 'grid';
            btnVolver.style.display = 'none';
            tituloSeccion.innerHTML = `🔍 Resultados para "${query}" <span class="result-count">Buscando...</span>`;

            try {
                const data = await fetchApi('search/tv', `query=${encodeURIComponent(query)}&page=1`);
                const results = data.results || [];
                tituloSeccion.innerHTML = `🔍 Resultados para "${query}" <span class="result-count">${data.total_results || 0} encontrados</span>`;
                renderGrid(results);
            } catch (e) {
                tituloSeccion.innerHTML = '❌ Error al buscar';
                grid.innerHTML = `<p style="color:#e50914;">Error: ${e.message}</p>`;
            }
        }

        // ================================================================
        // CARGAR PÁGINA
        // ================================================================
        async function cargarPagina(page = 1) {
            try {
                const data = await fetchApi('tv/popular', `page=${page}`);
                const newSeries = data.results || [];
                if (page === 1) allSeries = newSeries;
                else allSeries = allSeries.concat(newSeries);
                if (!modoBusqueda) renderGrid(allSeries);
                return newSeries.length > 0;
            } catch (e) {
                grid.innerHTML = `<p style="color:#e50914;">Error: ${e.message}</p>`;
                return false;
            }
        }

        // ================================================================
        // RENDER GRID
        // ================================================================
        function renderGrid(lista) {
            let filtered = lista;
            if (currentYear !== 'all' && !modoBusqueda) {
                filtered = filtered.filter(item => (item.first_air_date || '').startsWith(currentYear));
            }
            if (currentGenre !== 'all' && !modoBusqueda) {
                // Solo para UI, TMDb no permite filtrar por género en la lista popular (requiere discover)
                // Lo dejamos visual
            }

            if (!filtered || filtered.length === 0) {
                grid.innerHTML = `<p style="color:#888;text-align:center;padding:20px;grid-column:1/-1;">No hay resultados.</p>`;
                return;
            }
            grid.innerHTML = filtered.map(item => `
                <div class="card" data-id="${item.id}" data-titulo="${item.name}" data-sinopsis="${item.overview || ''}">
                    <img src="${item.poster_path ? BASE_IMG + item.poster_path : 'https://via.placeholder.com/300x450/222/555?text=No+Image'}" alt="${item.name}" loading="lazy">
                    <div class="info">
                        <h4>${item.name}</h4>
                        <p>⭐ ${item.vote_average?.toFixed(1) || 'N/A'}</p>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.dataset.id;
                    const titulo = card.dataset.titulo;
                    const sinopsis = card.dataset.sinopsis;
                    cargarTemporadas(id, titulo, sinopsis);
                });
            });
        }

        // ================================================================
        // TEMPORADAS Y EPISODIOS (MEJORADO)
        // ================================================================
        async function cargarTemporadas(serieId, titulo, sinopsis) {
            currentSerieId = serieId;
            currentSerieData = { titulo, sinopsis };
            contenedorEpisodios.style.display = 'block';
            grid.style.display = 'none';
            btnCargarMas.style.display = 'none';
            btnVolver.style.display = 'inline-block';
            tituloSeccion.innerHTML = `📺 ${titulo} <span class="badge">Temporadas</span>`;

            try {
                const data = await fetchApi(`tv/${serieId}`);
                serieTitulo.textContent = data.name;
                serieAno.textContent = data.first_air_date ? data.first_air_date.split('-')[0] : '';

                // Mostrar todas las temporadas con episodios > 0
                const temporadas = (data.seasons || []).filter(t => t.episode_count > 0);
                temporadas.sort((a, b) => a.season_number - b.season_number);

                if (temporadas.length === 0) {
                    temporadasContainer.innerHTML = `<p style="color:#888;">No hay temporadas disponibles.</p>`;
                    episodiosGrid.innerHTML = `<p style="color:#888;text-align:center;padding:20px;">Sin episodios</p>`;
                    return;
                }

                // Mostrar botones de temporadas
                temporadasContainer.innerHTML = temporadas.map((t, idx) => `
                    <button class="temp-btn ${idx === 0 ? 'active' : ''}" data-season="${t.season_number}">
                        T${t.season_number} ${t.name ? '- ' + t.name : ''}
                    </button>
                `).join('');

                // Seleccionar la temporada con más episodios por defecto
                let mejorTemp = temporadas.reduce((a, b) => a.episode_count > b.episode_count ? a : b);
                const tempInicial = mejorTemp.season_number;
                currentSeason = tempInicial;

                // Activar el botón correspondiente
                document.querySelectorAll('.temp-btn').forEach(btn => {
                    if (parseInt(btn.dataset.season) === tempInicial) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });

                await cargarEpisodios(serieId, tempInicial);

                // Eventos de cambio de temporada
                document.querySelectorAll('.temp-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.temp-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        const season = parseInt(btn.dataset.season);
                        currentSeason = season;
                        cargarEpisodios(serieId, season);
                    });
                });

            } catch (e) {
                console.error('Error cargando temporadas:', e);
                episodiosGrid.innerHTML = `<div class="error-msg">❌ Error al cargar temporadas: ${e.message}</div>`;
            }
        }

        async function cargarEpisodios(serieId, season) {
            try {
                const data = await fetchApi(`tv/${serieId}/season/${season}`);
                const episodios = data.episodes || [];

                if (episodios.length === 0) {
                    episodiosGrid.innerHTML = `<p style="color:#888;text-align:center;padding:20px;grid-column:1/-1;">No hay episodios en esta temporada.</p>`;
                    return;
                }

                episodiosGrid.innerHTML = episodios.map(ep => `
                    <div class="ep-card" data-episodio="${ep.episode_number}" data-titulo="${ep.name || 'Ep ' + ep.episode_number}" data-sinopsis="${ep.overview || ''}">
                        <div class="num">${ep.episode_number}</div>
                        <div class="title">${ep.name || 'Ep ' + ep.episode_number}</div>
                    </div>
                `).join('');

                // Evento de clic en episodio
                document.querySelectorAll('.ep-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const epNum = parseInt(card.dataset.episodio);
                        const epTitulo = card.dataset.titulo;
                        const epSinopsis = card.dataset.sinopsis;
                        if (sourceSelector.value === 'inteligente') {
                            reproducirInteligente(serieId, season, epNum, epTitulo, epSinopsis);
                        } else {
                            reproducirManual(serieId, season, epNum, epTitulo, epSinopsis, sourceSelector.value);
                        }
                    });
                });

            } catch (e) {
                console.error('Error cargando episodios:', e);
                episodiosGrid.innerHTML = `<div class="error-msg">❌ Error al cargar episodios: ${e.message}</div>`;
            }
        }

        // ================================================================
        // REPRODUCCIÓN INTELIGENTE
        // ================================================================
        async function reproducirInteligente(serieId, season, episode, titulo, sinopsis) {
            currentSerieId = serieId;
            currentSeason = season;
            currentEpisode = episode;
            currentSerieData = currentSerieData || { titulo: 'Serie', sinopsis: '' };

            const nombre = `${currentSerieData.titulo} - T${season}E${episode}: ${titulo}`;
            peliTitulo.textContent = nombre;
            peliSinopsis.textContent = sinopsis || currentSerieData.sinopsis || 'Sin sinopsis.';
            reproductor.classList.add('active');
            loadingVideo.style.display = 'flex';
            loadingText.textContent = '🔍 Buscando fuente...';
            fuenteInfo.textContent = '';
            iframe.src = '';

            // Probar dominios
            let encontrado = false;
            for (const dominio of DOMINIOS) {
                loadingText.textContent = `🔍 Probando ${dominio}...`;
                const url = `https://${dominio}/embed/tv/${serieId}/${season}/${episode}`;
                // Verificar con proxy
                try {
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                    const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(4000) });
                    const data = await res.json();
                    if (data.contents && !data.contents.toLowerCase().includes('404') && data.contents.length > 200) {
                        iframe.src = url;
                        fuenteInfo.textContent = `✅ Fuente: ${dominio}`;
                        encontrado = true;
                        loadingVideo.style.display = 'none';
                        break;
                    }
                } catch (e) {
                    continue;
                }
            }

            if (!encontrado) {
                loadingVideo.style.display = 'none';
                fuenteInfo.textContent = '❌ No se encontró fuente. Prueba manual.';
                peliSinopsis.textContent = '⚠️ No se pudo encontrar un enlace para este episodio. Cambia a una fuente manual.';
            }

            reproductor.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ================================================================
        // REPRODUCCIÓN MANUAL
        // ================================================================
        function reproducirManual(serieId, season, episode, titulo, sinopsis, dominio) {
            currentSerieId = serieId;
            currentSeason = season;
            currentEpisode = episode;
            currentSerieData = currentSerieData || { titulo: 'Serie', sinopsis: '' };

            const nombre = `${currentSerieData.titulo} - T${season}E${episode}: ${titulo}`;
            peliTitulo.textContent = nombre;
            peliSinopsis.textContent = sinopsis || currentSerieData.sinopsis || 'Sin sinopsis.';
            fuenteInfo.textContent = `🔧 Fuente manual: ${dominio}`;
            const url = `https://${dominio}/embed/tv/${serieId}/${season}/${episode}`;
            iframe.src = url;
            reproductor.classList.add('active');
            loadingVideo.style.display = 'flex';
            loadingText.textContent = 'Cargando...';
            setTimeout(() => { loadingVideo.style.display = 'none'; }, 3000);
            reproductor.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ================================================================
        // FUNCIONES REPRODUCTOR
        // ================================================================
        function recargar() {
            if (!currentSerieId || currentEpisode === null) return;
            const seleccion = sourceSelector.value;
            if (seleccion === 'inteligente') {
                reproducirInteligente(currentSerieId, currentSeason, currentEpisode, 'Episodio', '');
            } else {
                reproducirManual(currentSerieId, currentSeason, currentEpisode, 'Episodio', '', seleccion);
            }
        }

        document.getElementById('btnCerrarReproductor').addEventListener('click', () => {
            reproductor.classList.remove('active');
            iframe.src = '';
            loadingVideo.style.display = 'none';
        });

        btnRecargar.addEventListener('click', recargar);
        sourceSelector.addEventListener('change', recargar);

        // ================================================================
        // VOLVER A SERIES
        // ================================================================
        btnVolver.addEventListener('click', () => {
            contenedorEpisodios.style.display = 'none';
            grid.style.display = 'grid';
            btnCargarMas.style.display = 'block';
            btnVolver.style.display = 'none';
            tituloSeccion.innerHTML = `📌 ${currentTipo === 'tv' ? 'Series' : 'Animes'} Populares <span class="badge">Top</span>`;
            cargarPagina(currentPage);
        });

        // ================================================================
        // CARGAR MÁS
        // ================================================================
        btnCargarMas.addEventListener('click', async () => {
            if (modoBusqueda) return;
            if (currentPage >= MAX_PAGES) {
                btnCargarMas.textContent = 'Ya no hay más';
                btnCargarMas.disabled = true;
                return;
            }
            currentPage++;
            const hayMas = await cargarPagina(currentPage);
            if (!hayMas) {
                btnCargarMas.textContent = 'Ya no hay más';
                btnCargarMas.disabled = true;
            }
        });

        // ================================================================
        // BUSCADOR
        // ================================================================
        let timeoutBusqueda = null;
        buscador.addEventListener('input', (e) => {
            clearTimeout(timeoutBusqueda);
            timeoutBusqueda = setTimeout(() => buscar(e.target.value), 400);
        });

        // ================================================================
        // FILTROS
        // ================================================================
        document.querySelectorAll('.filter-btn[data-year]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn[data-year]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentYear = btn.dataset.year;
                if (!modoBusqueda) renderGrid(allSeries);
            });
        });

        document.querySelectorAll('.filter-btn[data-genre]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn[data-genre]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentGenre = btn.dataset.genre;
                if (!modoBusqueda) renderGrid(allSeries);
            });
        });

        // ================================================================
        // TABS
        // ================================================================
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if (tab.dataset.tab === 'anime') {
                    buscador.value = 'anime';
                    buscar('anime');
                } else if (tab.dataset.tab === 'tv') {
                    buscador.value = '';
                    modoBusqueda = false;
                    tituloSeccion.innerHTML = '📌 Series Populares <span class="badge">Top</span>';
                    btnCargarMas.style.display = 'block';
                    contenedorEpisodios.style.display = 'none';
                    grid.style.display = 'grid';
                    btnVolver.style.display = 'none';
                    cargarPagina(1);
                }
            });
        });

        // ================================================================
        // INICIO
        // ================================================================
        cargarPagina(1);
    </script>
</body>
</html>
