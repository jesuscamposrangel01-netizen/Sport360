<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineStar · 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET Y BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0a0a12;
            color: #f0f0f0;
            min-height: 100vh;
            padding-bottom: 70px;
            background-image: radial-gradient(circle at 20% 30%, rgba(229, 9, 20, 0.05) 0%, transparent 60%),
                              radial-gradient(circle at 80% 70%, rgba(0, 180, 255, 0.03) 0%, transparent 50%);
        }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 10px; }

        /* ===== HEADER ===== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 18, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #e50914, #ff4d4d, #f5c518);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo span {
            -webkit-text-fill-color: rgba(255,255,255,0.06);
            font-size: 0.6rem;
            font-weight: 700;
            background: rgba(255,255,255,0.03);
            padding: 2px 12px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.04);
            letter-spacing: 1.5px;
        }
        .nav-links {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .nav-link {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 40px;
            transition: all 0.3s ease;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }
        .nav-link:hover {
            color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.03);
        }
        .nav-link.active {
            color: #fff;
            background: rgba(229, 9, 20, 0.15);
        }
        .search-icon {
            color: rgba(255,255,255,0.08);
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.3s;
            background: none;
            border: none;
            padding: 4px 8px;
        }
        .search-icon:hover {
            color: rgba(255,255,255,0.3);
        }
        .search-input-temp {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 60px;
            padding: 8px 18px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            width: 180px;
            transition: 0.3s;
        }
        .search-input-temp:focus {
            border-color: rgba(229,9,20,0.3);
            width: 220px;
        }

        /* ===== HERO ===== */
        .hero {
            position: relative;
            margin: 16px 16px 28px;
            border-radius: 24px;
            overflow: hidden;
            background: linear-gradient(145deg, #14141f, #1f0c14);
            aspect-ratio: 16/5.5;
            min-height: 200px;
            display: flex;
            align-items: center;
            padding: 32px 44px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(10, 10, 18, 0.7) 0%, transparent 65%);
            pointer-events: none;
        }
        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 55%;
        }
        .hero-content .badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }
        .hero-content .badges span {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .hero-content h2 {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #fff, rgba(255, 255, 255, 0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.05;
            margin-top: 4px;
        }
        .hero-content p {
            color: rgba(255, 255, 255, 0.25);
            font-size: 1rem;
            margin-top: 8px;
            max-width: 480px;
            line-height: 1.6;
            font-weight: 400;
        }
        .hero-content .btn-hero {
            margin-top: 18px;
            background: linear-gradient(135deg, #e50914, #b20710);
            border: none;
            color: #fff;
            padding: 14px 38px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 4px 25px rgba(229, 9, 20, 0.15);
            letter-spacing: 0.3px;
        }
        .hero-content .btn-hero:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 35px rgba(229, 9, 20, 0.25);
        }
        .hero-poster {
            position: absolute;
            right: 30px;
            bottom: -10px;
            width: 180px;
            border-radius: 18px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
            aspect-ratio: 2/3;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.04);
            z-index: 2;
            transition: 0.4s ease;
            background: #1a1a1a;
        }
        .hero:hover .hero-poster {
            transform: scale(1.02) rotate(-1deg);
        }

        /* ===== SECCIÓN ===== */
        .section {
            padding: 0 16px;
            margin-bottom: 30px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .section-header h3 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-header h3 .badge {
            font-size: 0.55rem;
            background: rgba(229, 9, 20, 0.15);
            padding: 3px 14px;
            border-radius: 40px;
            color: #e50914;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            -webkit-text-fill-color: #e50914;
            border: 1px solid rgba(229, 9, 20, 0.1);
        }
        .section-header .ver-todo {
            color: rgba(255, 255, 255, 0.08);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 0.5px;
            background: none;
            border: none;
        }
        .section-header .ver-todo:hover {
            color: rgba(255, 255, 255, 0.3);
        }

        /* ===== CANALES EN VIVO ===== */
        .canales-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 4px 0 14px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .canales-scroll::-webkit-scrollbar {
            height: 3px;
        }
        .canales-scroll::-webkit-scrollbar-thumb {
            background: #e50914;
            border-radius: 10px;
        }
        .canal-card {
            flex: 0 0 auto;
            scroll-snap-align: start;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 20px 24px;
            min-width: 160px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.4s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .canal-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(229, 9, 20, 0.1);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }
        .canal-card .icono {
            font-size: 2.6rem;
            display: block;
            margin-bottom: 4px;
        }
        .canal-card .nombre {
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -0.2px;
        }
        .canal-card .categoria {
            color: rgba(255, 255, 255, 0.08);
            font-size: 0.7rem;
            margin-top: 2px;
        }
        .canal-card .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #e50914;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .canal-card .live-label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #e50914;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== GRID PELÍCULAS (más grande) ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }
        .card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.45s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }
        .card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(229, 9, 20, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }
        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
            transition: 0.4s ease;
        }
        .card:hover img {
            transform: scale(1.04);
        }
        .card .info {
            padding: 16px 16px 18px;
        }
        .card .info h4 {
            font-size: 1rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #f0f0f0;
            letter-spacing: -0.2px;
        }
        .card .info p {
            color: #f5c518;
            font-size: 0.8rem;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card .info .year {
            color: rgba(255, 255, 255, 0.1);
            font-size: 0.7rem;
        }
        .card .info .idioma-icon {
            color: #00ff88;
            font-size: 0.65rem;
            margin-left: auto;
            opacity: 0.4;
        }

        /* ===== BOTÓN CARGAR MÁS ===== */
        .btn-cargar-mas {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.08);
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            max-width: 320px;
            margin: 16px auto 0;
            display: block;
            letter-spacing: 0.5px;
        }
        .btn-cargar-mas:hover {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.2);
        }
        .btn-cargar-mas:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* ===== REPRODUCTOR ===== */
        .reproductor {
            display: none;
            margin: 20px 16px 30px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
        }
        .reproductor.active {
            display: block;
            animation: fadeSlide 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            background: rgba(0, 0, 0, 0.3);
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }
        .player-header .btn-back {
            background: none;
            border: none;
            color: #e50914;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .player-header .btn-back:hover {
            color: #ff4d4d;
            transform: scale(1.04);
        }
        .player-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .player-controls select {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
            outline: none;
            transition: 0.3s;
        }
        .player-controls select:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .player-controls button {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.3);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .player-controls button:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }
        .player-video {
            width: 100%;
            height: 70vh;
            min-height: 380px;
            background: #000;
            position: relative;
        }
        .player-video iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .player-video video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .player-video .cargando {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.06);
            background: rgba(0, 0, 0, 0.5);
            padding: 24px 36px;
            border-radius: 60px;
            text-align: center;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.02);
            pointer-events: none;
        }
        .player-video .cargando .spinner {
            display: inline-block;
            width: 34px;
            height: 34px;
            border: 3px solid rgba(255, 255, 255, 0.04);
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 14px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .player-footer {
            padding: 18px 24px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.02);
        }
        .player-footer h3 {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            color: #f0f0f0;
        }
        .player-footer p {
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.9rem;
            margin-top: 6px;
            line-height: 1.5;
        }
        .player-footer .info-extra {
            color: rgba(0, 255, 136, 0.15);
            font-size: 0.75rem;
            margin-top: 8px;
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 18, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-around;
            padding: 6px 0 12px;
            z-index: 200;
        }
        .bottom-nav .nav-item {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.08);
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            transition: 0.3s;
            padding: 4px 12px;
        }
        .bottom-nav .nav-item .icon {
            font-size: 1.6rem;
            line-height: 1;
        }
        .bottom-nav .nav-item:hover {
            color: rgba(255, 255, 255, 0.2);
        }
        .bottom-nav .nav-item.active {
            color: #e50914;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header { padding: 10px 12px; }
            .logo { font-size: 1.6rem; }
            .nav-link { font-size: 0.7rem; padding: 4px 10px; }
            .hero { aspect-ratio: 16/8; padding: 20px 24px; min-height: 130px; margin: 12px 12px 20px; }
            .hero-content h2 { font-size: 2.2rem; }
            .hero-content p { display: none; }
            .hero-poster { width: 110px; right: 16px; bottom: -6px; }
            .hero-content { max-width: 65%; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
            .canal-card { min-width: 130px; padding: 16px 18px; }
            .player-video { height: 50vh; min-height: 250px; }
            .section { padding: 0 12px; }
            .reproductor { margin: 12px; }
            .player-header { padding: 10px 16px; }
            .player-footer { padding: 12px 16px; }
            .section-header h3 { font-size: 1.3rem; }
            .search-input-temp { width: 130px; font-size: 0.85rem; }
            .search-input-temp:focus { width: 160px; }
        }
        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
            .hero { aspect-ratio: 16/10; padding: 14px 16px; min-height: 100px; }
            .hero-content h2 { font-size: 1.6rem; }
            .hero-poster { width: 80px; right: 10px; bottom: -4px; }
            .hero-content .badges span { font-size: 0.5rem; padding: 1px 8px; }
            .canal-card { min-width: 110px; padding: 12px 14px; }
            .canal-card .icono { font-size: 2rem; }
            .canal-card .nombre { font-size: 0.8rem; }
            .nav-link { font-size: 0.6rem; padding: 4px 8px; }
            .player-video { height: 35vh; min-height: 200px; }
            .section-header h3 { font-size: 1.1rem; }
            .card .info h4 { font-size: 0.85rem; }
            .card .info p { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                🎬 CineStar <span>2026</span>
            </div>
            <div class="nav-links" id="navLinks">
                <button class="nav-link active" data-tipo="movie">Inicio</button>
                <button class="nav-link" data-tipo="espanol">🇪🇸 Películas Español</button>
                <button class="nav-link" data-tipo="tv">📺 Series</button>
                <button class="nav-link" data-tipo="tv_es">🇪🇸 Series Español</button>
                <button class="nav-link" data-tipo="anime">🎌 Anime</button>
                <button class="nav-link" data-tipo="canales">📡 Canales TV</button>
            </div>
            <button class="search-icon" id="searchToggle">🔍</button>
        </div>
    </header>

    <!-- ===== HERO ===== -->
    <div class="hero" id="hero">
        <div class="hero-content">
            <div class="badges">
                <span id="heroBadge1">★ Destacado</span>
                <span id="heroBadge2">2026</span>
            </div>
            <h2 id="heroTitulo">CineStar</h2>
            <p id="heroDesc">+5000 películas, series, anime y canales de TV en vivo. Todo en español.</p>
            <button class="btn-hero" id="btnHero">Ver ahora</button>
        </div>
        <img id="heroPoster" class="hero-poster" src="https://image.tmdb.org/t/p/w300/8s4h9fP8ZxQ5ZxQ5ZxQ5ZxQ5ZxQ5.jpg" alt="Poster">
    </div>

    <!-- ===== SECCIÓN CANALES EN VIVO ===== -->
    <div class="section" id="seccionCanales">
        <div class="section-header">
            <h3>📡 Canales en Vivo <span class="badge">En directo</span></h3>
            <button class="ver-todo" id="verCanales">Ver todos →</button>
        </div>
        <div class="canales-scroll" id="canalesScroll"></div>
    </div>

    <!-- ===== SECCIÓN PRINCIPAL ===== -->
    <div class="section" id="seccionPrincipal">
        <div class="section-header">
            <h3 id="tituloSeccion">🎬 Las Pelis Más Vistas <span class="badge">🔥</span></h3>
            <button class="ver-todo" id="verTodo">Ver todo →</button>
        </div>
        <div id="grid" class="grid"></div>
        <button class="btn-cargar-mas" id="btnCargarMas">Cargar más</button>
    </div>

    <!-- ===== REPRODUCTOR ===== -->

    <script>
        // ================================================================
        // CONFIGURACIÓN
        // ================================================================
        const API_KEY = 'bda7a5fa2507ebcef3fcebd2287d72c9';
        const BASE_IMG = 'https://image.tmdb.org/t/p/w300';

        const FUENTES = {
            movie: ['vidsrc.in', '2embed.skin', 'vidlink.pro', 'vidsrc.pm', 'vidfast.pro', 'vidsrc.xyz', 'vidsrc.cc'],
            espanol: ['2embed.skin', 'vidsrc.in', 'vidlink.pro', 'vidsrc.pm', 'vidfast.pro', 'vidsrc.xyz', 'vidsrc.cc'],
            tv: ['vidsrc.in', 'vidlink.pro', 'vidsrc.pm', '2embed.skin', 'vidfast.pro', 'vidsrc.xyz', 'vidsrc.cc'],

        };

        // ================================================================

        // ================================================================
        const CANALES_TV = [
            { nombre: 'CNN Internacional', icono: '🌍', stream: 'https://cdn-1.live.hoola.tv/cnn-intl/playlist.m3u8',
                categoria: 'Noticias' },

            { nombre: 'EuroNews', icono: '🇪🇺', stream: 'https://cdn-1.live.hoola.tv/euronews/playlist.m3u8',
                categoria: 'Noticias' },
            { nombre: 'NASA TV', icono: '🚀', stream: 'https://ntv1.akamaized.net/hls/live/2013875/NASA-NTV1-HLS/master.m3u8',
                categoria: 'Ciencia' },
            { nombre: 'TCM (Cine Clásico)', icono: '🎞️', stream: 'https://tcm-esp.live.hoola.tv/tcm-esp/playlist.m3u8',
                categoria: 'Cine' },
            { nombre: 'France 24 Español', icono: '🇫🇷', stream: 'https://cdn-1.live.hoola.tv/france24-es/playlist.m3u8',
                categoria: 'Noticias' },
            { nombre: 'DW Español', icono: '🇩🇪', stream: 'https://dw-esp.live.hoola.tv/dw-esp/playlist.m3u8',
                categoria: 'Noticias' },
            { nombre: 'TeleSUR', icono: '🌎', stream: 'https://cdn-1.live.hoola.tv/telesur/playlist.m3u8',
                categoria: 'Noticias' },
            { nombre: 'Canal 24h (RTVE)', icono: '🇪🇸', stream: 'https://rtve-24h-live.hls.adaptive.level3.net/hls/24h/playlist.m3u8',
                categoria: 'Noticias' },
            { nombre: 'Canal Sur', icono: '🇪🇸', stream: 'https://cdn-1.live.hoola.tv/canalsur/playlist.m3u8',
                categoria: 'Regional' }
        ];

        // ================================================================
        // DOM
        // ================================================================
        const grid = document.getElementById('grid');
        const tituloSeccion = document.getElementById('tituloSeccion');
        const verTodo = document.getElementById('verTodo');
        const verCanales = document.getElementById('verCanales');
        const btnCargarMas = document.getElementById('btnCargarMas');
        const reproductor = document.getElementById('reproductor');
        const iframe = document.getElementById('iframeVideo');
        const videoPlayer = document.getElementById('videoPlayer');
        const loadingVideo = document.getElementById('loadingVideo');
        const loadingText = document.getElementById('loadingText');
        const peliTitulo = document.getElementById('peliTitulo');
        const peliSinopsis = document.getElementById('peliSinopsis');
        const fuenteInfo = document.getElementById('fuenteInfo');
        const sourceSelector = document.getElementById('sourceSelector');
        const btnRecargar = document.getElementById('btnRecargar');
        const btnSiguiente = document.getElementById('btnSiguiente');
        const btnCerrarReproductor = document.getElementById('btnCerrarReproductor');
        const navLinks = document.querySelectorAll('.nav-link');
        const bottomNavItems = document.querySelectorAll('.bottom-nav .nav-item');
        const heroTitulo = document.getElementById('heroTitulo');
        const heroDesc = document.getElementById('heroDesc');
        const heroPoster = document.getElementById('heroPoster');
        const heroBadge1 = document.getElementById('heroBadge1');
        const heroBadge2 = document.getElementById('heroBadge2');
        const btnHero = document.getElementById('btnHero');
        const canalesScroll = document.getElementById('canalesScroll');
        const searchToggle = document.getElementById('searchToggle');
        const bottomSearch = document.getElementById('bottomSearch');

        let allItems = [];
        let currentPage = 1;
        let currentTipo = 'movie';
        let modoBusqueda = false;
        let currentSerieId = null;
        let currentSeason = null;
        let currentEpisode = null;
        let currentSerieData = null;
        let idxFuenteActual = 0;
        let timeoutBusqueda = null;
        let fuentesActuales = [];
        let timeoutAuto = null;
        let episodiosCache = [];
        const MAX_PAGES = 50;

        // ================================================================
        // API
        // ================================================================
        async function fetchApi(endpoint, extra = '') {
            let url = `https://api.themoviedb.org/3/${endpoint}?api_key=${API_KEY}&language=es-MX`;
            if (extra) url += `&${extra}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Error ${res.status}`);
            return res.json();
        }

        // ================================================================
        // CARGAR CANALES TV
        // ================================================================
        function cargarCanalesTV() {
            canalesScroll.innerHTML = CANALES_TV.map(c => `
                    <div class="canal-card" data-stream="${c.stream}" data-nombre="${c.nombre}" data-categoria="${c.categoria}">
                        <span class="icono">${c.icono}</span>
                        <div class="nombre">${c.nombre}</div>
                        <div class="categoria">${c.categoria}</div>
                        <div class="live-label"><span class="live-dot"></span>En vivo</div>
                    </div>
                `).join('');

            document.querySelectorAll('.canal-card').forEach(card => {
                card.addEventListener('click', () => {
                    const stream = card.dataset.stream;
                    const nombre = card.dataset.nombre;
                    const categoria = card.dataset.categoria;
                    reproducirTV(stream, nombre, categoria);
                });
            });
        }

        function reproducirTV(stream, nombre, categoria) {
            reproductor.classList.add('active');
            peliTitulo.textContent = `${nombre} (${categoria})`;
            peliSinopsis.textContent = '📡 Transmisión en vivo. Disfruta de este canal de televisión.';
            fuenteInfo.textContent = '🔴 En vivo · Fuente: ' + stream;

            iframe.style.display = 'none';
            videoPlayer.style.display = 'block';
            loadingVideo.style.display = 'flex';
            loadingText.textContent = '🔴 Conectando al canal...';

            if (typeof Hls !== 'undefined') {
                const hls = new Hls();
                hls.loadSource(stream);
                hls.attachMedia(videoPlayer);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    videoPlayer.play().catch(() => {});
                    loadingVideo.style.display = 'none';
                });
                hls.on(Hls.Events.ERROR, () => {
                    loadingVideo.style.display = 'none';
                    peliSinopsis.textContent = '⚠️ No se pudo conectar al canal. Prueba otro.';
                });
            } else {
                videoPlayer.src = stream;
                videoPlayer.play().catch(() => {
                    loadingVideo.style.display = 'none';
                    peliSinopsis.textContent = '⚠️ Tu navegador no soporta HLS.';
                });
                loadingVideo.style.display = 'none';
            }
            reproductor.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ================================================================
        // CARGAR PÁGINA
        // ================================================================
        async function cargarPagina(page = 1) {
            try {
                let endpoint, extra = `page=${page}`;
                if (currentTipo === 'movie') {
                    endpoint = 'movie/popular';
                } else if (currentTipo === 'espanol') {
                    endpoint = 'discover/movie';
                    extra += `&with_original_language=es&sort_by=popularity.desc`;
                } else if (currentTipo === 'tv') {
                    endpoint = 'tv/popular';
                } else if (currentTipo === 'tv_es') {
                    endpoint = 'discover/tv';
                    extra += `&with_original_language=es&sort_by=popularity.desc`;
                } else if (currentTipo === 'anime') {
                    endpoint = 'discover/tv';
                    extra += `&with_genres=16&with_original_language=ja`;
                } else {
                    return false;
                }

                const data = await fetchApi(endpoint, extra);
                const nuevos = data.results || [];
                if (page === 1) allItems = nuevos;
                else allItems = allItems.concat(nuevos);
                if (!modoBusqueda) {
                    renderGrid(allItems);
                    actualizarHero(allItems);
                }
                return nuevos.length > 0;
            } catch (e) {
                grid.innerHTML = `<p style="color:#e50914;text-align:center;padding:30px;">❌ Error: ${e.message}</p>`;
                return false;
            }
        }

        // ================================================================
        // ACTUALIZAR HERO
        // ================================================================
        function actualizarHero(lista) {
            if (!lista || lista.length === 0) return;
            const destacado = lista.find(item => item.poster_path) || lista[0];
            const titulo = destacado.title || destacado.name || 'CineStar';
            const desc = destacado.overview || 'Descubre el mejor contenido.';
            const fecha = destacado.release_date || destacado.first_air_date || '';
            const año = fecha ? fecha.split('-')[0] : '2026';
            heroTitulo.textContent = titulo;
            heroDesc.textContent = desc.length > 140 ? desc.slice(0, 140) + '...' : desc;
            heroBadge1.textContent = '★ Destacado';
            heroBadge2.textContent = año;
            if (destacado.poster_path) {
                heroPoster.src = BASE_IMG + destacado.poster_path;
                heroPoster.style.display = 'block';
            }
            btnHero.style.display = 'inline-block';
            btnHero.onclick = () => {
                const id = destacado.id;
                const tipo = destacado.media_type === 'movie' || (destacado.title && !destacado.name) ? 'movie' : 'tv';
                const tituloCard = destacado.title || destacado.name;
                const sinopsis = destacado.overview || '';
                if (tipo === 'movie') {
                    reproducirPelicula(id, tituloCard, sinopsis);
                } else {
                    cargarTemporadas(id, tituloCard, sinopsis);
                }
            };
        }

        // ================================================================
        // RENDER GRID
        // ================================================================
        function renderGrid(lista) {
            if (!lista || lista.length === 0) {
                grid.innerHTML =
                    `<p style="color:rgba(255,255,255,0.05);text-align:center;padding:40px;">No hay resultados.</p>`;
                return;
            }
            grid.innerHTML = lista.map(item => {
                const esPelicula = item.media_type === 'movie' || (item.title && !item.name);
                const titulo = esPelicula ? item.title : item.name;
                const fecha = esPelicula ? item.release_date : item.first_air_date;
                const año = fecha ? fecha.split('-')[0] : '';
                const id = item.id;
                const tipo = esPelicula ? 'movie' : 'tv';
                const idiomaOriginal = item.original_language || '';
                const esEspanol = idiomaOriginal === 'es' || idiomaOriginal === 'la';
                return `
                        <div class="card" data-id="${id}" data-titulo="${titulo}" data-sinopsis="${item.overview || ''}" data-tipo="${tipo}">
                            <img src="${item.poster_path ? BASE_IMG + item.poster_path : 'https://via.placeholder.com/300x450/222/555?text=No+Image'}" alt="${titulo}" loading="lazy">
                            <div class="info">
                                <h4>${titulo}</h4>
                                <p>⭐ ${item.vote_average?.toFixed(1) || 'N/A'} <span class="year">${año}</span>
                                    ${esEspanol ? '<span class="idioma-icon">🎙️</span>' : ''}
                                </p>
                            </div>
                        </div>
                    `;
            }).join('');

            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.dataset.id;
                    const titulo = card.dataset.titulo;
                    const sinopsis = card.dataset.sinopsis;
                    const tipo = card.dataset.tipo;
                    if (tipo === 'movie') {
                        reproducirPelicula(id, titulo, sinopsis);
                    } else {
                        cargarTemporadas(id, titulo, sinopsis);
                    }
                });
            });
        }

        // ================================================================
        // REPRODUCIR PELÍCULA
        // ================================================================
        function reproducirPelicula(id, titulo, sinopsis) {
            currentSerieId = id;
            currentSerieData = { titulo, sinopsis };
            currentSeason = null;
            currentEpisode = null;
            currentTipo = document.querySelector('.nav-link.active')?.dataset?.tipo || 'movie';

            peliTitulo.textContent = titulo;
            peliSinopsis.textContent = sinopsis || 'Sin sinopsis.';
            fuenteInfo.textContent = '';
            videoPlayer.style.display = 'none';
            iframe.style.display = 'block';

            reproductor.classList.add('active');
            loadingVideo.style.display = 'flex';
            loadingText.textContent = '🔍 Buscando fuente...';

            fuentesActuales = FUENTES[currentTipo] || FUENTES.movie;

            if (sourceSelector.value === 'auto') {
                buscarFuenteAuto(id, 'movie');
            } else {
                const dominio = sourceSelector.value;
                const url = `https://${dominio}/embed/movie/${id}`;
                iframe.src = url;
                fuenteInfo.textContent = `🔧 Fuente: ${dominio}`;
                loadingVideo.style.display = 'none';
            }
            reproductor.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ================================================================
        // BUSCAR FUENTE AUTO
        // ================================================================
        function buscarFuenteAuto(id, tipo = 'movie', season = null, episode = null) {
            idxFuenteActual = 0;
            probarSiguienteFuente(id, tipo, season, episode);
        }

        function probarSiguienteFuente(id, tipo, season, episode) {
            if (idxFuenteActual >= fuentesActuales.length) {
                loadingVideo.style.display = 'none';
                fuenteInfo.textContent = '❌ No se encontró ninguna fuente.';
                peliSinopsis.textContent = '⚠️ No se pudo encontrar un enlace. Prueba manual.';
                return;
            }
            const dominio = fuentesActuales[idxFuenteActual];
            let url = tipo === 'movie' ? `https://${dominio}/embed/movie/${id}` :
                `https://${dominio}/embed/tv/${id}/${season}/${episode}`;
            loadingText.textContent = `🔍 Probando ${idxFuenteActual+1}/${fuentesActuales.length}: ${dominio}...`;
            iframe.src = url;
            if (timeoutAuto) clearTimeout(timeoutAuto);
            iframe.onload = () => {
                clearTimeout(timeoutAuto);
                loadingVideo.style.display = 'none';
                fuenteInfo.textContent = `✅ Fuente: ${dominio}`;
                iframe.onload = null;
                iframe.onerror = null;
            };
            iframe.onerror = () => {
                clearTimeout(timeoutAuto);
                idxFuenteActual++;
                probarSiguienteFuente(id, tipo, season, episode);
                iframe.onerror = null;
            };
            timeoutAuto = setTimeout(() => {
                iframe.onload = null;
                iframe.onerror = null;
                idxFuenteActual++;
                probarSiguienteFuente(id, tipo, season, episode);
            }, 5000);
        }

        // ================================================================
        // CARGAR TEMPORADAS Y EPISODIOS
        // ================================================================
        async function cargarTemporadas(serieId, titulo, sinopsis) {
            currentSerieId = serieId;
            currentSerieData = { titulo, sinopsis };
            grid.style.display = 'none';
            btnCargarMas.style.display = 'none';
            verTodo.style.display = 'none';
            tituloSeccion.innerHTML = `📺 ${titulo} <span class="badge">Temporadas</span>`;

            try {
                const data = await fetchApi(`tv/${serieId}`);
                const temporadas = (data.seasons || []).filter(t => t.episode_count > 0);
                temporadas.sort((a, b) => a.season_number - b.season_number);

                if (temporadas.length === 0) {
                    grid.innerHTML =
                        `<p style="color:rgba(255,255,255,0.1);text-align:center;padding:30px;">No hay temporadas.</p>`;
                    grid.style.display = 'grid';
                    return;
                }

                let html =
                    `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;justify-content:center;">`;
                temporadas.forEach((t, idx) => {
                    html +=
                        `<button class="temp-btn" data-season="${t.season_number}" style="background:${idx===0?'rgba(229,9,20,0.15)':'rgba(255,255,255,0.03)'};border:1px solid ${idx===0?'rgba(229,9,20,0.3)':'rgba(255,255,255,0.04)'};color:${idx===0?'#fff':'rgba(255,255,255,0.3)'};padding:8px 20px;border-radius:40px;font-size:0.8rem;font-weight:600;cursor:pointer;transition:0.3s;">T${t.season_number}</button>`;
                });
                html += `</div>`;
                html +=
                    `<div id="episodiosContainer" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;"></div>`;
                grid.innerHTML = html;
                grid.style.display = 'grid';

                const primeraTemp = temporadas[0].season_number;
                cargarEpisodios(serieId, primeraTemp);

                document.querySelectorAll('.temp-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.temp-btn').forEach(b => {
                            b.style.background = 'rgba(255,255,255,0.03)';
                            b.style.borderColor = 'rgba(255,255,255,0.04)';
                            b.style.color = 'rgba(255,255,255,0.3)';
                        });
                        btn.style.background = 'rgba(229,9,20,0.15)';
                        btn.style.borderColor = 'rgba(229,9,20,0.3)';
                        btn.style.color = '#fff';
                        const season = parseInt(btn.dataset.season);
                        cargarEpisodios(serieId, season);
                    });
                });

            } catch (e) {
                console.error(e);
                grid.innerHTML = `<p style="color:#e50914;text-align:center;padding:30px;">❌ Error: ${e.message}</p>`;
                grid.style.display = 'grid';
            }
        }

        async function cargarEpisodios(serieId, season) {
            try {
                const data = await fetchApi(`tv/${serieId}/season/${season}`);
                const episodios = data.episodes || [];
                episodiosCache = episodios;
                const container = document.getElementById('episodiosContainer');
                if (!container) return;

                if (episodios.length === 0) {
                    container.innerHTML = `<p style="color:rgba(255,255,255,0.1);padding:20px;">No hay episodios.</p>`;
                    return;
                }

                container.innerHTML = episodios.map(ep => `
                        <div class="ep-card" data-episodio="${ep.episode_number}" data-titulo="${ep.name || 'Ep ' + ep.episode_number}" data-sinopsis="${ep.overview || ''}" style="background:rgba(255,255,255,0.02);border-radius:16px;padding:16px;text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,0.03);transition:0.3s;">
                            <div style="font-size:1.4rem;font-weight:800;color:#e50914;">${ep.episode_number}</div>
                            <div style="font-size:0.6rem;color:rgba(255,255,255,0.15);margin-top:4px;">${ep.name || 'Ep ' + ep.episode_number}</div>
                        </div>
                    `).join('');

                document.querySelectorAll('.ep-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const epNum = parseInt(card.dataset.episodio);
                        const epTitulo = card.dataset.titulo;
                        const epSinopsis = card.dataset.sinopsis;
                        reproducirEpisodio(serieId, season, epNum, epTitulo, epSinopsis);
                    });
                });

            } catch (e) {
                console.error(e);
            }
        }

        function reproducirEpisodio(serieId, season, episode, titulo, sinopsis) {
            currentSerieId = serieId;
            currentSeason = season;
            currentEpisode = episode;
            currentSerieData = currentSerieData || { titulo: 'Serie', sinopsis: '' };
            currentTipo = document.querySelector('.nav-link.active')?.dataset?.tipo || 'tv';

            const nombre = `${currentSerieData.titulo} - T${season}E${episode}`;
            peliTitulo.textContent = nombre;
            peliSinopsis.textContent = sinopsis || currentSerieData.sinopsis || 'Sin sinopsis.';
            fuenteInfo.textContent = '';
            videoPlayer.style.display = 'none';
            iframe.style.display = 'block';

            reproductor.classList.add('active');
            loadingVideo.style.display = 'flex';
            loadingText.textContent = '🔍 Buscando fuente...';

            fuentesActuales = FUENTES[currentTipo] || FUENTES.tv;

            if (sourceSelector.value === 'auto') {
                buscarFuenteAuto(serieId, 'tv', season, episode);
            } else {
                const dominio = sourceSelector.value;
                const url = `https://${dominio}/embed/tv/${serieId}/${season}/${episode}`;
                iframe.src = url;
                fuenteInfo.textContent = `🔧 Fuente: ${dominio}`;
                loadingVideo.style.display = 'none';
            }
            reproductor.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ================================================================
        // REPRODUCTOR CONTROLES
        // ================================================================
        function recargar() {
            if (currentSerieId && !currentSeason) {
                reproducirPelicula(currentSerieId, currentSerieData.titulo, currentSerieData.sinopsis);
            } else if (currentSerieId && currentSeason !== null && currentEpisode !== null) {
                const ep = episodiosCache[currentEpisode - 1] || { name: 'Episodio', overview: '' };
                reproducirEpisodio(currentSerieId, currentSeason, currentEpisode, ep.name, ep.overview);
            }
        }

        function siguienteFuente() {
            if (currentSerieId && !currentSeason) {
                idxFuenteActual++;
                if (idxFuenteActual >= fuentesActuales.length) {
                    fuenteInfo.textContent = '❌ No hay más fuentes.';
                    return;
                }
                probarSiguienteFuente(currentSerieId, 'movie');
            } else if (currentSerieId && currentSeason !== null && currentEpisode !== null) {
                idxFuenteActual++;
                if (idxFuenteActual >= fuentesActuales.length) {
                    fuenteInfo.textContent = '❌ No hay más fuentes.';
                    return;
                }
                probarSiguienteFuente(currentSerieId, 'tv', currentSeason, currentEpisode);
            }
        }

        btnCerrarReproductor.addEventListener('click', () => {
            reproductor.classList.remove('active');
            iframe.src = '';
            videoPlayer.pause();
            videoPlayer.removeAttribute('src');
            videoPlayer.style.display = 'none';
            iframe.style.display = 'block';
            loadingVideo.style.display = 'none';
            fuenteInfo.textContent = '';
            if (timeoutAuto) clearTimeout(timeoutAuto);
            // Volver a mostrar el grid
            if (currentSerieId && currentSeason !== null) {
                cargarTemporadas(currentSerieId, currentSerieData.titulo, currentSerieData.sinopsis);
            } else {
                grid.style.display = 'grid';
                btnCargarMas.style.display = 'block';
                verTodo.style.display = 'inline-block';
                const tipo = currentTipo;
                if (tipo === 'movie') tituloSeccion.innerHTML = `🎬 Las Pelis Más Vistas <span class="badge">🔥</span>`;
                else if (tipo === 'espanol') tituloSeccion.innerHTML =
                    `🇪🇸 Películas en Español <span class="badge">🎙️</span>`;
                else if (tipo === 'tv') tituloSeccion.innerHTML = `📺 Series Populares <span class="badge">🔥</span>`;
                else if (tipo === 'tv_es') tituloSeccion.innerHTML =
                    `🇪🇸 Series en Español <span class="badge">🎙️</span>`;
                else if (tipo === 'anime') tituloSeccion.innerHTML = `🎌 Animes Populares <span class="badge">🔥</span>`;
                cargarPagina(1);
            }
        });

        btnRecargar.addEventListener('click', recargar);
        btnSiguiente.addEventListener('click', siguienteFuente);
        sourceSelector.addEventListener('change', recargar);

        // ================================================================
        // NAVEGACIÓN
        // ================================================================
        function cambiarTipo(tipo) {
            currentTipo = tipo;
            currentPage = 1;
            modoBusqueda = false;
            grid.style.display = 'grid';
            btnCargarMas.style.display = 'block';
            verTodo.style.display = 'inline-block';

            // Título según tipo
            if (tipo === 'movie') tituloSeccion.innerHTML = `🎬 Las Pelis Más Vistas <span class="badge">🔥</span>`;
            else if (tipo === 'espanol') tituloSeccion.innerHTML =
                `🇪🇸 Películas en Español <span class="badge">🎙️</span>`;
            else if (tipo === 'tv') tituloSeccion.innerHTML = `📺 Series Populares <span class="badge">🔥</span>`;
            else if (tipo === 'tv_es') tituloSeccion.innerHTML =
                `🇪🇸 Series en Español <span class="badge">🎙️</span>`;
            else if (tipo === 'anime') tituloSeccion.innerHTML = `🎌 Animes Populares <span class="badge">🔥</span>`;
            else if (tipo === 'canales') {
                document.getElementById('seccionCanales').style.display = 'block';
                grid.style.display = 'none';
                btnCargarMas.style.display = 'none';
                verTodo.style.display = 'none';
                tituloSeccion.innerHTML = '📡 Canales en Vivo <span class="badge">📺</span>';
                cargarCanalesTV();
                heroTitulo.textContent = '📡 Canales de TV en Vivo';
                heroDesc.textContent = 'Selecciona un canal de la lista para empezar a ver en directo.';
                heroPoster.style.display = 'none';
                btnHero.style.display = 'none';
                heroBadge1.textContent = '📡 En vivo';
                heroBadge2.textContent = '24/7';
                return;
            }

            document.getElementById('seccionCanales').style.display = 'block';
            cargarCanalesTV();
            heroPoster.style.display = 'block';
            btnHero.style.display = 'inline-block';
            cargarPagina(1);
        }

        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                navLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                const tipo = link.dataset.tipo;
                cambiarTipo(tipo);
                // Actualizar bottom nav
                bottomNavItems.forEach(i => {
                    i.classList.remove('active');
                    if (i.dataset.tipo === tipo) i.classList.add('active');
                });
            });
        });

        bottomNavItems.forEach(item => {
            item.addEventListener('click', () => {
                bottomNavItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                const tipo = item.dataset.tipo;
                if (tipo) {
                    navLinks.forEach(l => {
                        l.classList.remove('active');
                        if (l.dataset.tipo === tipo) l.classList.add('active');
                    });
                    cambiarTipo(tipo);
                }
            });
        });

        // ================================================================
        // VER TODO / CARGAR MÁS
        // ================================================================
        verTodo.addEventListener('click', () => {
            if (currentPage < MAX_PAGES) {
                currentPage++;
                cargarPagina(currentPage);
            }
        });

        btnCargarMas.addEventListener('click', () => {
            if (currentPage < MAX_PAGES) {
                currentPage++;
                cargarPagina(currentPage);
            } else {
                btnCargarMas.textContent = '🏁 Ya no hay más';
                btnCargarMas.disabled = true;
                btnCargarMas.style.opacity = '0.2';
            }
        });

        verCanales.addEventListener('click', () => {
            document.getElementById('seccionCanales').scrollIntoView({ behavior: 'smooth' });
        });

        // ================================================================
        // BUSCADOR (con input)
        // ================================================================
        let searchActive = false;
        let searchInput = null;

        function crearBuscador() {
            if (searchInput) return;
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Buscar películas, series...';
            input.className = 'search-input-temp';
            input.id = 'searchInputTemp';
            const parent = searchToggle.parentNode;
            parent.insertBefore(input, searchToggle);
            input.focus();
            searchActive = true;
            searchInput = input;

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const query = input.value.trim();
                    if (query) {
                        buscar(query);
                        input.remove();
                        searchInput = null;
                        searchActive = false;
                    }
                }
            });
            input.addEventListener('blur', () => {
                setTimeout(() => {
                    if (input.value.trim() === '') {
                        input.remove();
                        searchInput = null;
                        searchActive = false;
                    }
                }, 200);
            });
        }

        searchToggle.addEventListener('click', () => {
            if (searchActive) {
                if (searchInput) {
                    searchInput.remove();
                    searchInput = null;
                    searchActive = false;
                }
            } else {
                crearBuscador();
            }
        });

        bottomSearch.addEventListener('click', () => {
            if (searchActive) {
                if (searchInput) {
                    searchInput.remove();
                    searchInput = null;
                    searchActive = false;
                }
            } else {
                crearBuscador();
            }
        });

        // ================================================================
        // BUSCAR (lógica)
        // ================================================================
        async function buscar(query) {
            if (!query.trim()) return;
            modoBusqueda = true;
            grid.style.display = 'grid';
            btnCargarMas.style.display = 'none';
            verTodo.style.display = 'none';
            tituloSeccion.innerHTML = `🔍 "${query}" <span class="result-count">Buscando...</span>`;
            try {
                let data;
                const tipo = currentTipo;
                if (tipo === 'movie' || tipo === 'espanol') {
                    data = await fetchApi('search/movie', `query=${encodeURIComponent(query)}&page=1`);
                    if (tipo === 'espanol') {
                        data.results = (data.results || []).filter(item => item.original_language === 'es' || item
                            .original_language === 'la');
                    }
                } else if (tipo === 'tv' || tipo === 'tv_es') {
                    data = await fetchApi('search/tv', `query=${encodeURIComponent(query)}&page=1`);
                    if (tipo === 'tv_es') {
                        data.results = (data.results || []).filter(item => item.original_language === 'es' || item
                            .original_language === 'la');
                    }
                } else if (tipo === 'anime') {
                    data = await fetchApi('search/tv', `query=${encodeURIComponent(query)}&page=1`);
                    data.results = (data.results || []).filter(item => item.genre_ids && item.genre_ids.includes(16));
                } else {
                    data = await fetchApi('search/multi', `query=${encodeURIComponent(query)}&page=1`);
                }
                const results = data.results || [];
                tituloSeccion.innerHTML = `🔍 "${query}" <span class="result-count">${results.length} encontrados</span>`;
                renderGrid(results);
                actualizarHero(results);
                modoBusqueda = false;
            } catch (e) {
                tituloSeccion.innerHTML = '❌ Error al buscar';
                grid.innerHTML = `<p style="color:#e50914;text-align:center;padding:30px;">Error: ${e.message}</p>`;
                modoBusqueda = false;
            }
        }

        // ================================================================
        // INICIO
        // ================================================================
        cargarCanalesTV();
        cargarPagina(1);
    </script>
</body>
</html>
