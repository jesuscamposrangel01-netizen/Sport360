<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>AnimeStream | Ver animes online</title>
    <meta name="description" content="AnimeStream - Plataforma para ver animes online gratis desde tu celular." />
    <meta name="theme-color" content="#0a0a1a" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a1a;
            color: #f0f0ff;
            min-height: 100vh;
            padding-bottom: 20px;
            overflow-x: hidden;
        }
        /* ===== HEADER ===== */
        header {
            background: rgba(10, 10, 26, 0.97);
            backdrop-filter: blur(12px);
            padding: 10px 14px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(124, 58, 237, 0.15);
        }
        .header-inner {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: 900;
            color: #a78bfa;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .logo span {
            color: #fff;
        }
        .logo .badge {
            font-size: 0.45rem;
            background: #7c3aed;
            color: #fff;
            padding: 1px 8px;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
            margin-left: 4px;
        }
        .search-box {
            display: flex;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            flex: 1;
            min-width: 0;
        }
        .search-box input {
            flex: 1;
            padding: 8px 12px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 0.8rem;
            outline: none;
            min-width: 40px;
        }
        .search-box input::placeholder {
            color: #666;
            font-size: 0.7rem;
        }
        .search-box button {
            padding: 8px 14px;
            background: #7c3aed;
            color: #fff;
            font-weight: 600;
            font-size: 0.7rem;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .search-box button:active {
            background: #5b21b6;
        }

        /* ===== MAIN ===== */
        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 14px 14px 20px;
        }

        .hero {
            background: linear-gradient(135deg, #1a1a4e 0%, #0d0d2b 50%, #1a0a2e 100%);
            border-radius: 18px;
            padding: 24px 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(124, 58, 237, 0.12);
        }
        .hero h1 {
            font-size: 1.5rem;
            font-weight: 800;
        }
        .hero h1 .highlight {
            color: #a78bfa;
        }
        .hero p {
            color: #a0a0c0;
            font-size: 0.85rem;
            margin-top: 6px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 22px;
            background: #7c3aed;
            border-radius: 4px;
        }

        /* ===== GRID ANIMES ===== */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        @media (min-width: 420px) {
            .anime-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        .anime-card {
            background: #1a1a3e;
            border-radius: 14px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: 1px solid #2a2a5a;
            -webkit-tap-highlight-color: transparent;
        }
        .anime-card:active {
            transform: scale(0.96);
        }
        .anime-card .card-img {
            position: relative;
            padding-top: 140%;
            background: #12122a;
            overflow: hidden;
        }
        .anime-card .card-img img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .anime-card .info {
            padding: 10px 12px 12px;
        }
        .anime-card .info h3 {
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .anime-card .info .meta {
            font-size: 0.6rem;
            color: #888;
            display: flex;
            justify-content: space-between;
            margin-top: 2px;
        }
        .anime-card .info .meta .score {
            color: #fcd34d;
            font-weight: 700;
        }

        /* ===== PLAYER SECTION ===== */
        .player-section {
            background: #1a1a3e;
            border-radius: 18px;
            padding: 16px;
            margin-top: 24px;
            border: 1px solid #2a2a5a;
            display: none;
        }
        .player-section.active {
            display: block;
            animation: fadeUp 0.35s ease;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .player-section .player-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }
        .player-section .player-title {
            font-size: 1rem;
            font-weight: 700;
            color: #a78bfa;
            flex: 1;
            min-width: 0;
            word-break: break-word;
        }
        .player-section .player-status {
            font-size: 0.65rem;
            color: #888;
            background: rgba(255, 255, 255, 0.04);
            padding: 3px 12px;
            border-radius: 20px;
            border: 1px solid #2a2a5a;
            white-space: nowrap;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 14px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-wrapper .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #888;
        }
        .video-wrapper .placeholder .icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 6px;
        }
        .player-section .player-info {
            font-size: 0.75rem;
            color: #888;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: center;
        }
        .player-section .player-info a {
            color: #a78bfa;
            text-decoration: underline;
        }

        /* ===== EPISODE LIST ===== */
        .episode-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
            max-height: 200px;
            overflow-y: auto;
            padding: 2px 0;
        }
        .episode-list button {
            background: rgba(255, 255, 255, 0.04);
            color: #a0a0c0;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid #2a2a5a;
            transition: all 0.2s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .episode-list button:active {
            transform: scale(0.95);
        }
        .episode-list button:hover {
            background: #7c3aed;
            color: #fff;
            border-color: #7c3aed;
        }
        .episode-list button.active {
            background: #7c3aed;
            color: #fff;
            border-color: #7c3aed;
        }
        .episode-list .no-episodes {
            color: #888;
            padding: 16px 0;
            text-align: center;
            width: 100%;
            font-size: 0.85rem;
        }
        .episode-list .no-episodes .icon {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 4px;
        }

        .close-btn {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.7rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
            transition: all 0.2s;
            cursor: pointer;
            flex-shrink: 0;
        }
        .close-btn:active {
            background: #ef4444;
            color: #fff;
        }

        /* ===== SPINNER ===== */
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #2a2a5a;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 24px auto;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .load-more {
            text-align: center;
            margin-top: 24px;
        }
        .load-more button {
            background: rgba(255, 255, 255, 0.04);
            color: #a0a0c0;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            border: 1px solid #2a2a5a;
            transition: all 0.2s;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
        }
        .load-more button:active {
            background: #7c3aed;
            color: #fff;
            border-color: #7c3aed;
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 20px 14px;
            color: #444;
            font-size: 0.65rem;
            border-top: 1px solid #1a1a3e;
            margin-top: 30px;
        }
        footer a {
            color: #a78bfa;
            text-decoration: none;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #12122a;
        }
        ::-webkit-scrollbar-thumb {
            background: #7c3aed;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="logo">
                🎬 Anime<span>Stream</span>
                <span class="badge">beta</span>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar..." />
                <button id="searchBtn">Buscar</button>
            </div>
        </div>
    </header>

    <main>
        <div class="hero">
            <h1>Explora el <span class="highlight">mundo</span> del anime</h1>
            <p>Toca cualquier anime y mira sus episodios gratis.</p>
        </div>

        <div class="section-title">🔥 Animes populares</div>
        <div id="animeGrid" class="anime-grid"></div>
        <div class="load-more" id="loadMoreContainer">
            <button id="loadMoreBtn">Cargar más</button>
        </div>

        <!-- Reproductor -->
        <div id="playerSection" class="player-section">
            <div class="player-header">
                <div class="player-title" id="playerTitle">Título</div>
                <div>
                    <span class="player-status" id="playerStatus">Cargando...</span>
                    <button class="close-btn" id="closePlayer">✕</button>
                </div>
            </div>
            <div class="video-wrapper">
                <div class="placeholder" id="videoPlaceholder">
                    <span class="icon">🎬</span>
                    Selecciona un episodio
                </div>
                <iframe id="videoIframe" src="" allowfullscreen style="display:none;"></iframe>
            </div>
            <div class="player-info" id="playerInfo">💡 Toca un episodio para ver</div>
            <div class="episode-list" id="episodeList"></div>
        </div>

        <div id="loadingIndicator" style="display:none;">
            <div class="spinner"></div>
            <p style="text-align:center;color:#888;font-size:0.85rem;">Cargando animes...</p>
        </div>
    </main>

    <footer>
        © 2026 AnimeStream – Datos de <a href="https://myanimelist.net/" target="_blank">MyAnimeList</a>
    </footer>

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const JIKAN_API = 'https://api.jikan.moe/v4';
        const CONSUMET_API = 'https://consumet-api-production-5c0c.up.railway.app';

        let currentPage = 1;
        let currentQuery = '';
        let isLoading = false;
        let hasMore = true;

        const grid = document.getElementById('animeGrid');
        const loadingEl = document.getElementById('loadingIndicator');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const loadMoreBtn = document.getElementById('loadMoreBtn');

        const playerSection = document.getElementById('playerSection');
        const playerTitle = document.getElementById('playerTitle');
        const playerStatus = document.getElementById('playerStatus');
        const playerInfo = document.getElementById('playerInfo');
        const episodeList = document.getElementById('episodeList');
        const videoIframe = document.getElementById('videoIframe');
        const videoPlaceholder = document.getElementById('videoPlaceholder');
        const closeBtn = document.getElementById('closePlayer');

        // ============================================================
        // FUNCIONES DE API
        // ============================================================
        async function fetchAnimes(page = 1, query = '') {
            try {
                let url;
                if (query) {
                    url = `${JIKAN_API}/anime?q=${encodeURIComponent(query)}&page=${page}&limit=24`;
                } else {
                    url = `${JIKAN_API}/top/anime?filter=bypopularity&page=${page}&limit=24`;
                }
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('Error al obtener animes');
                const data = await resp.json();
                return data.data || [];
            } catch (error) {
                console.error('Jikan error:', error);
                return [];
            }
        }

        async function searchAnimeOnConsumet(query) {
            try {
                const response = await fetch(`${CONSUMET_API}/anime/gogoanime/search?query=${encodeURIComponent(query)}`);
                if (!response.ok) throw new Error(`Error ${response.status}`);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Consumet search error:', error);
                return null;
            }
        }

        async function fetchEpisodesFromConsumet(animeId) {
            try {
                const response = await fetch(`${CONSUMET_API}/anime/gogoanime/episodes/${animeId}`);
                if (!response.ok) throw new Error(`Error ${response.status}`);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Consumet episodes error:', error);
                return null;
            }
        }

        async function fetchStreamFromConsumet(episodeId) {
            try {
                const response = await fetch(`${CONSUMET_API}/anime/gogoanime/watch/${episodeId}`);
                if (!response.ok) throw new Error(`Error ${response.status}`);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Consumet stream error:', error);
                return null;
            }
        }

        // ============================================================
        // RENDERIZADO
        // ============================================================

        function renderAnimeList(animes, append = false) {
            if (!animes || animes.length === 0) {
                if (!append) {
                    grid.innerHTML =
                        `<p style="color:#888; text-align:center; grid-column:1/-1; padding:30px 0; font-size:0.9rem;">No se encontraron animes. 😢</p>`;
                }
                hasMore = false;
                loadMoreBtn.style.display = 'none';
                return;
            }

            const html = animes.map(anime => {
                const img = anime.images?.jpg?.image_url ||
                    'https://via.placeholder.com/300x420/1a1a3e/888?text=No+Image';
                const title = anime.title || 'Título desconocido';
                const score = anime.score ? `⭐ ${anime.score}` : '⭐ N/A';
                const year = anime.year || '??';
                return `
                            <div class="anime-card" data-title="${title}" data-malid="${anime.mal_id}">
                                <div class="card-img">
                                    <img src="${img}" alt="${title}" loading="lazy" />
                                </div>
                                <div class="info">
                                    <h3>${title}</h3>
                                    <div class="meta">
                                        <span>${year}</span>
                                        <span class="score">${score}</span>
                                    </div>
                                </div>
                            </div>
                        `;
            }).join('');

            if (append) {
                grid.insertAdjacentHTML('beforeend', html);
            } else {
                grid.innerHTML = html;
            }

            document.querySelectorAll('.anime-card').forEach(card => {
                card.removeEventListener('click', handleCardClick);
                card.addEventListener('click', handleCardClick);
            });

            hasMore = animes.length === 24;
            loadMoreBtn.style.display = hasMore ? 'block' : 'none';
        }

        async function handleCardClick(e) {
            const card = e.currentTarget;
            const title = card.dataset.title;
            const malId = card.dataset.malid;
            await openAnime(title, malId);
        }

        // ============================================================
        // ABRIR ANIME
        // ============================================================
        async function openAnime(title, malId) {
            playerSection.classList.add('active');
            playerTitle.textContent = title;
            playerStatus.textContent = 'Buscando...';
            playerInfo.textContent = '💡 Conectando con el servidor...';
            episodeList.innerHTML = '<div class="spinner" style="width:28px;height:28px;margin:16px auto;"></div>';
            videoIframe.style.display = 'none';
            videoPlaceholder.style.display = 'block';
            videoPlaceholder.innerHTML = '<span class="icon">⏳</span> Cargando...';

            playerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

            // Buscar en Consumet
            const searchResult = await searchAnimeOnConsumet(title);

            if (!searchResult || !searchResult.results || searchResult.results.length === 0) {
                episodeList.innerHTML = `
                            <div class="no-episodes">
                                <span class="icon">😅</span>
                                No se encontró "${title}" en Gogoanime.<br>
                                <span style="font-size:0.7rem; color:#888;">
                                    Busca en <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(title)}+anime" target="_blank" style="color:#a78bfa;">YouTube</a>
                                </span>
                            </div>
                        `;
                playerStatus.textContent = 'No disponible';
                playerInfo.textContent = '❌ No encontrado en Gogoanime';
                videoPlaceholder.innerHTML = '<span class="icon">😢</span> No disponible';
                return;
            }

            let bestMatch = searchResult.results[0];
            let bestScore = 0;
            const titleLower = title.toLowerCase();
            for (const result of searchResult.results) {
                const resultTitle = (result.title || '').toLowerCase();
                let score = 0;
                if (resultTitle === titleLower) score = 100;
                else if (resultTitle.includes(titleLower)) score = 50;
                else if (titleLower.includes(resultTitle)) score = 30;
                if (score > bestScore) { bestScore = score;
                    bestMatch = result; }
            }

            const animeId = bestMatch.id;
            const foundTitle = bestMatch.title || title;
            console.log(`✅ Encontrado: ${foundTitle} (ID: ${animeId})`);

            const episodesData = await fetchEpisodesFromConsumet(animeId);

            if (!episodesData || !episodesData.episodes || episodesData.episodes.length === 0) {
                episodeList.innerHTML = `
                            <div class="no-episodes">
                                <span class="icon">😅</span>
                                No hay episodios para "${foundTitle}".
                            </div>
                        `;
                playerStatus.textContent = 'Sin episodios';
                playerInfo.textContent = '❌ No se encontraron episodios';
                videoPlaceholder.innerHTML = '<span class="icon">😢</span> Sin episodios';
                return;
            }

            const episodes = episodesData.episodes;
            const totalEpisodes = episodes.length;
            playerTitle.textContent = foundTitle;
            playerStatus.textContent = `${totalEpisodes} episodios`;
            playerInfo.textContent = `📺 ${totalEpisodes} episodios disponibles. Toca uno para ver.`;

            const maxEp = Math.min(totalEpisodes, 100);
            let html = '';
            const perRow = 20;

            for (let i = 0; i < maxEp; i += perRow) {
                const batch = Math.min(i + perRow, maxEp);
                html += `<div style="display:flex;flex-wrap:wrap;gap:5px;width:100%;margin-bottom:4px;">`;
                for (let ep = i + 1; ep <= batch; ep++) {
                    const epObj = episodes[ep - 1];
                    const episodeId = epObj?.id || `${animeId}-episode-${ep}`;
                    html += `<button data-ep="${ep}" data-id="${episodeId}">${ep}</button>`;
                }
                html += `</div>`;
            }

            episodeList.innerHTML = html;

            episodeList.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const epNum = parseInt(btn.dataset.ep);
                    const episodeId = btn.dataset.id;

                    episodeList.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    videoPlaceholder.style.display = 'block';
                    videoPlaceholder.innerHTML = `<span class="icon">⏳</span> Cargando episodio ${epNum}...`;
                    videoIframe.style.display = 'none';
                    playerStatus.textContent = `Cargando Ep ${epNum}...`;

                    const streamData = await fetchStreamFromConsumet(episodeId);

                    if (streamData && streamData.sources && streamData.sources.length > 0) {
                        const videoUrl = streamData.sources[0].url;
                        videoPlaceholder.style.display = 'none';
                        videoIframe.style.display = 'block';
                        videoIframe.src = videoUrl;
                        playerStatus.textContent = `▶️ Episodio ${epNum}`;
                        playerInfo.textContent = `▶️ Reproduciendo Episodio ${epNum}`;
                    } else {
                        videoPlaceholder.innerHTML = `
                                    <span class="icon">🔗</span>
                                    Episodio ${epNum} no disponible.<br>
                                    <span style="font-size:0.7rem; color:#888;">
                                        <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(foundTitle)}+episodio+${epNum}" target="_blank" style="color:#a78bfa;">Buscar en YouTube</a>
                                    </span>
                                `;
                        playerStatus.textContent = `Ep ${epNum} no disponible`;
                    }
                });
            });

            const firstBtn = episodeList.querySelector('button');
            if (firstBtn) {
                firstBtn.classList.add('active');
                setTimeout(() => firstBtn.click(), 500);
            }
        }

        // ============================================================
        // CARGA Y BÚSQUEDA
        // ============================================================

        async function loadAnimes(page = 1, query = '', append = false) {
            if (isLoading) return;
            isLoading = true;
            loadingEl.style.display = 'block';
            if (!append) grid.innerHTML = '';

            const animes = await fetchAnimes(page, query);
            loadingEl.style.display = 'none';
            isLoading = false;

            if (animes.length === 0 && !append) {
                renderAnimeList([]);
                return;
            }
            renderAnimeList(animes, append);
        }

        async function performSearch() {
            const query = searchInput.value.trim();
            currentQuery = query;
            currentPage = 1;
            await loadAnimes(currentPage, query, false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function loadMore() {
            if (isLoading || !hasMore) return;
            currentPage++;
            await loadAnimes(currentPage, currentQuery, true);
        }

        // ============================================================
        // EVENTOS
        // ============================================================

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') performSearch();
        });
        loadMoreBtn.addEventListener('click', loadMore);

        closeBtn.addEventListener('click', () => {
            playerSection.classList.remove('active');
            videoIframe.src = '';
            videoIframe.style.display = 'none';
            videoPlaceholder.style.display = 'block';
            videoPlaceholder.innerHTML = '<span class="icon">🎬</span> Selecciona un episodio';
        });

        // ============================================================
        // INICIO
        // ============================================================

        loadAnimes(1, '', false);
    </script>
</body>
</html>
