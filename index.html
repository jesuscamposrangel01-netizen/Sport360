<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seekee · Películas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #0d0d0d;
            color: #fff;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e50914, #b20710);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .buscar {
            padding: 10px 16px;
            border-radius: 30px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            width: 280px;
            max-width: 100%;
            outline: none;
            transition: 0.3s;
        }
        .buscar:focus {
            border-color: #e50914;
            background: #222;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }
        .card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(229, 9, 20, 0.4);
        }
        .card img {
            width: 100%;
            display: block;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .card .info {
            padding: 12px 14px;
        }
        .card .titulo {
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card .calificacion {
            color: #f5c518;
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .reproductor {
            display: none;
            margin-top: 30px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }
        .reproductor.active {
            display: block;
        }
        .reproductor iframe {
            width: 100%;
            height: 60vh;
            min-height: 360px;
            border: none;
        }
        .reproductor .info-peli {
            padding: 18px 22px;
            background: #111;
        }
        .reproductor .info-peli h2 {
            margin-bottom: 6px;
        }
        .reproductor .info-peli p {
            color: #aaa;
            font-size: 0.95rem;
            max-width: 800px;
        }
        .cerrar {
            background: #e50914;
            border: none;
            color: #fff;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 15px;
            transition: 0.2s;
        }
        .cerrar:hover {
            background: #b20710;
        }
        .back-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .back-top button {
            background: none;
            border: none;
            color: #e50914;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: 600;
        }
        @media (max-width: 500px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 14px;
            }
            .logo {
                font-size: 1.5rem;
            }
            .buscar {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">🎬 Seekee</div>
        <input class="buscar" id="buscador" type="text" placeholder="Buscar película...">
    </div>

    <!-- Grid de películas -->
    <div id="catalogo" class="grid"></div>

    <!-- Reproductor (oculto hasta que se elija una película) -->
    <div id="reproductor" class="reproductor">
        <div class="back-top">
            <button id="btnCerrarReproductor">← Volver</button>
            <span style="color:#888; font-size:0.9rem;">Reproduciendo desde fuente externa</span>
        </div>
        <iframe id="iframeVideo" src="" allowfullscreen allow="encrypted-media; fullscreen"></iframe>
        <div class="info-peli">
            <h2 id="peliTitulo"></h2>
            <p id="peliSinopsis"></p>
        </div>
    </div>

    <script>
        // ========== CONFIGURACIÓN ==========
        // ⚠️ REEMPLAZA "TU_TOKEN_AQUI" por el NUEVO token de TMDb (el que regeneraste)
        const TMDB_TOKEN = 'TU_TOKEN_AQUI';
        // ===================================

        const catalogo = document.getElementById('catalogo');
        const buscador = document.getElementById('buscador');
        const reproductor = document.getElementById('reproductor');
        const iframe = document.getElementById('iframeVideo');
        const peliTitulo = document.getElementById('peliTitulo');
        const peliSinopsis = document.getElementById('peliSinopsis');

        let peliculas = [];

        // Obtener películas populares
        async function cargarPeliculas() {
            try {
                const res = await fetch('https://api.themoviedb.org/3/movie/popular?language=es-MX&page=1', {
                    headers: { 'Authorization': `Bearer ${TMDB_TOKEN}` }
                });
                const data = await res.json();
                peliculas = data.results || [];
                renderizar(peliculas);
            } catch (e) {
                catalogo.innerHTML = `<p style="color:#e50914; font-size:1.2rem;">❌ Error al cargar películas. Revisa tu token.</p>`;
                console.error(e);
            }
        }

        function renderizar(lista) {
            if (!lista.length) {
                catalogo.innerHTML = `<p style="color:#aaa;">No se encontraron películas.</p>`;
                return;
            }
            catalogo.innerHTML = lista.map(p => `
                <div class="card" data-id="${p.id}" data-titulo="${p.title}" data-sinopsis="${p.overview || 'Sin sinopsis disponible.'}">
                    <img src="https://image.tmdb.org/t/p/w300${p.poster_path}" alt="${p.title}" loading="lazy">
                    <div class="info">
                        <div class="titulo">${p.title}</div>
                        <div class="calificacion">⭐ ${p.vote_average?.toFixed(1) || 'N/A'}</div>
                    </div>
                </div>
            `).join('');

            // Añadir evento a cada tarjeta
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.dataset.id;
                    const titulo = card.dataset.titulo;
                    const sinopsis = card.dataset.sinopsis;
                    abrirReproductor(id, titulo, sinopsis);
                });
            });
        }

        // Buscar en tiempo real (filtra localmente)
        buscador.addEventListener('input', (e) => {
            const texto = e.target.value.toLowerCase().trim();
            const filtradas = peliculas.filter(p => p.title.toLowerCase().includes(texto));
            renderizar(filtradas);
        });

        function abrirReproductor(id, titulo, sinopsis) {
            // URL de fuente de video (iframe) - cambia el dominio si deja de funcionar
            const videoSrc = `https://vidsrc.xyz/embed/movie/${id}`;
            iframe.src = videoSrc;
            peliTitulo.textContent = titulo;
            peliSinopsis.textContent = sinopsis;
            reproductor.classList.add('active');
            // scroll suave al reproductor
            reproductor.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Cerrar reproductor
        document.getElementById('btnCerrarReproductor').addEventListener('click', () => {
            reproductor.classList.remove('active');
            iframe.src = ''; // detiene la carga del video
        });

        // Cargar todo al inicio
        cargarPeliculas();
    </script>

</body>
</html>
