<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeStream | Ver animes online</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: #f0f0ff;
            min-height: 100vh;
        }
        header {
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(124, 58, 237, 0.15);
        }
        .header-inner {
            max-width: 1360px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: #a78bfa;
        }
        .logo span {
            color: #fff;
        }
        .search-box {
            display: flex;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            flex: 1;
            max-width: 400px;
        }
        .search-box input {
            flex: 1;
            padding: 10px 18px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        .search-box input::placeholder {
            color: #888;
        }
        .search-box button {
            padding: 10px 22px;
            background: #7c3aed;
            color: #fff;
            font-weight: 600;
            transition: background 0.3s;
            font-size: 0.85rem;
        }
        .search-box button:hover {
            background: #5b21b6;
        }

        main {
            max-width: 1360px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .hero {
            background: linear-gradient(135deg, #1a1a4e 0%, #0d0d2b 50%, #1a0a2e 100%);
            border-radius: 24px;
            padding: 40px 36px;
            margin-bottom: 32px;
            border: 1px solid rgba(124, 58, 237, 0.15);
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 900;
        }
        .hero h1 .highlight {
            color: #a78bfa;
        }
        .hero p {
            color: #a0a0c0;
            margin-top: 8px;
            max-width: 500px;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 28px;
            background: #7c3aed;
            border-radius: 4px;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        .anime-card {
            background: #1a1a3e;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 1px solid #2a2a5a;
        }
        .anime-card:hover {
            transform: translateY(-6px);
            border-color: #7c3aed;
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.2);
        }
        .anime-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background: #12122a;
        }
        .anime-card .info {
            padding: 12px 14px 14px;
        }
        .anime-card .info h3 {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .anime-card .info .meta {
            font-size: 0.75rem;
            color: #888;
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
        }
        .anime-card .info .meta .score {
            color: #fcd34d;
            font-weight: 700;
        }

        .player-section {
            background: #1a1a3e;
            border-radius: 20px;
            padding: 24px;
            margin-top: 32px;
            border: 1px solid #2a2a5a;
            display: none;
        }
        .player-section.active {
            display: block;
            animation: fadeUp 0.4s ease;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .player-section .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }
        .player-section .player-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #a78bfa;
        }
        .player-section .player-status {
            font-size: 0.8rem;
            color: #888;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid #2a2a5a;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 16px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-wrapper .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #888;
        }
        .video-wrapper .placeholder .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 8px;
        }
        .player-section .player-info {
            font-size: 0.85rem;
            color: #888;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            margin-bottom: 12px;
            text-align: center;
        }
        .player-section .player-info a {
            color: #a78bfa;
            text-decoration: underline;
        }

        .episode-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
            max-height: 250px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .episode-list button {
            background: rgba(255, 255, 255, 0.04);
            color: #a0a0c0;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid #2a2a5a;
            transition: all 0.3s;
            cursor: pointer;
        }
        .episode-list button:hover {
            background: #7c3aed;
            color: #fff;
            border-color: #7c3aed;
        }
        .episode-list button.active {
            background: #7c3aed;
            color: #fff;
            border-color: #7c3aed;
        }
        .episode-list .no-episodes {
            color: #888;
            padding: 20px 0;
            text-align: center;
            width: 100%;
        }
        .episode-list .no-episodes .icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 8px;
        }

        .close-btn {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            padding: 4px 18px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.8rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
            transition: all 0.3s;
            cursor: pointer;
        }
        .close-btn:hover {
            background: #ef4444;
            color: #fff;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #2a2a5a;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .load-more {
            text-align: center;
            margin-top: 30px;
        }
        .load-more button {
            background: rgba(255, 255, 255, 0.04);
            color: #a0a0c0;
            padding: 12px 40px;
            border-radius: 40px;
            font-weight: 600;
            border: 1px solid #2a2a5a;
            transition: all 0.3s;
            cursor: pointer;
        }
        .load-more button:hover {
            background: #7c3aed;
            color: #fff;
            border-color: #7c3aed;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: #555;
            font-size: 0.8rem;
            border-top: 1px solid #1a1a3e;
            margin-top: 40px;
        }
        footer a {
            color: #a78bfa;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .search-box {
                max-width: 100%;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 14px;
            }
            .anime-card img {
                height: 200px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="logo">🎬 Anime<span>Stream</span></div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar anime..." />
                <button id="searchBtn">Buscar</button>
            </div>
        </div>
    </header>

    <main>
        <div class="hero">
            <h1>Explora el <span class="highlight">mundo</span> del anime</h1>
            <p>Haz clic en cualquier anime para ver sus episodios.</p>
        </div>

        <div class="section-title">🔥 Animes populares</div>
        <div id="animeGrid" class="anime-grid"></div>
        <div class="load-more" id="loadMoreContainer">
            <button id="loadMoreBtn">Cargar más</button>
        </div>

        <!-- Reproductor -->
        <div id="playerSection" class="player-section">
            <div class="player-header">
                <div class="player-title" id="playerTitle">Título del anime</div>
                <div>
                    <span class="player-status" id="playerStatus">Cargando...</span>
                    <button class="close-btn" id="closePlayer">✕ Cerrar</button>
                </div>
            </div>
            <div class="video-wrapper">
                <div class="placeholder" id="videoPlaceholder">
                    <span class="icon">🎬</span>
                    Selecciona un episodio para ver
                </div>
                <iframe id="videoIframe" src="" allowfullscreen style="display:none;"></iframe>
            </div>
            <div class="player-info" id="playerInfo">
                💡 Los episodios se reproducen desde nuestra API
            </div>
            <div class="episode-list" id="episodeList"></div>
        </div>

        <div id="loadingIndicator" style="display:none;">
            <div class="spinner"></div>
            <p style="text-align:center;color:#888;">Cargando animes...</p>
        </div>
    </main>

    <footer>
        © 2026 AnimeStream – Datos de <a href="https://rapidapi.com/" target="_blank">RapidAPI</a>
    </footer>

    <script>
        // ============================================================
        // CONFIGURACIÓN DE RAPIDAPI
        // ============================================================
        const RAPIDAPI_KEY = 'f019ce89dfmsh54169a00fd80f9bp1c5aadjsn50be5f785083';
        const RAPIDAPI_HOST = 'animes5.p.rapidapi.com';

        // ============================================================
        // BASE DE DATOS DE ANIMES CON IDs DE RAPIDAPI
        // ============================================================
        const ANIME_DB = {
            'naruto': 5114,
            'one piece': 5220,
            'death note': 5114,
            'attack on titan': 16498,
            'demon slayer': 46914,
            'jujutsu kaisen': 48567,
            'my hero academia': 35851,
            'fullmetal alchemist brotherhood': 5114,
            'bleach': 5114,
            'dragon ball z': 5114,
        };

        let currentPage = 1;
        let currentQuery = '';
        let isLoading = false;
        let hasMore = true;
        let currentAnimeId = null;

        const grid = document.getElementById('animeGrid');
        const loadingEl = document.getElementById('loadingIndicator');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const loadMoreBtn = document.getElementById('loadMoreBtn');

        const playerSection = document.getElementById('playerSection');
        const playerTitle = document.getElementById('playerTitle');
        const playerStatus = document.getElementById('playerStatus');
        const playerInfo = document.getElementById('playerInfo');
        const episodeList = document.getElementById('episodeList');
        const videoIframe = document.getElementById('videoIframe');
        const videoPlaceholder = document.getElementById('videoPlaceholder');
        const closeBtn = document.getElementById('closePlayer');

        // ============================================================
        // FUNCIONES DE API RAPIDAPI
        // ============================================================

        async function fetchAnimeById(animeId) {
            try {
                const response = await fetch(`https://animes5.p.rapidapi.com/anime/${animeId}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-rapidapi-host': RAPIDAPI_HOST,
                        'x-rapidapi-key': RAPIDAPI_KEY
                    }
                });

                if (!response.ok) {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error fetching anime:', error);
                return null;
            }
        }

        async function searchAnime(query) {
            try {
                const response = await fetch(`https://animes5.p.rapidapi.com/search?q=${encodeURIComponent(query)}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-rapidapi-host': RAPIDAPI_HOST,
                        'x-rapidapi-key': RAPIDAPI_KEY
                    }
                });

                if (!response.ok) {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error searching anime:', error);
                return null;
            }
        }

        // ============================================================
        // FUNCIONES DE RENDERIZADO
        // ============================================================

        function renderAnimeList(animes, append = false) {
            if (!animes || animes.length === 0) {
                if (!append) {
                    grid.innerHTML =
                        `<p style="color:#888; text-align:center; grid-column:1/-1; padding:40px 0;">No se encontraron animes. 😢</p>`;
                }
                hasMore = false;
                loadMoreBtn.style.display = 'none';
                return;
            }

            const html = animes.map(anime => {
                const img = anime.image || anime.images?.jpg?.image_url ||
                    'https://via.placeholder.com/300x420/1a1a3e/888?text=No+Image';
                const title = anime.title || anime.name || 'Título desconocido';
                const score = anime.score || anime.rating || 'N/A';

                return `
                            <div class="anime-card" data-title="${title}" data-id="${anime.id || anime.mal_id || ''}">
                                <img src="${img}" alt="${title}" loading="lazy" />
                                <div class="info">
                                    <h3>${title}</h3>
                                    <div class="meta">
                                        <span>${anime.year || '??'}</span>
                                        <span class="score">⭐ ${score}</span>
                                    </div>
                                </div>
                            </div>
                        `;
            }).join('');

            if (append) {
                grid.insertAdjacentHTML('beforeend', html);
            } else {
                grid.innerHTML = html;
            }

            document.querySelectorAll('.anime-card').forEach(card => {
                card.removeEventListener('click', handleCardClick);
                card.addEventListener('click', handleCardClick);
            });

            hasMore = animes.length === 24;
            loadMoreBtn.style.display = hasMore ? 'block' : 'none';
        }

        function handleCardClick(e) {
            const card = e.currentTarget;
            const title = card.dataset.title;
            const id = card.dataset.id;
            openAnime(title, id);
        }

        // ============================================================
        // ABRIR ANIME CON REPRODUCTOR
        // ============================================================
        async function openAnime(title, id) {
            playerSection.classList.add('active');
            playerTitle.textContent = title;
            playerStatus.textContent = 'Cargando...';
            playerInfo.innerHTML = '💡 Cargando episodios...';
            episodeList.innerHTML = '<div class="spinner" style="width:30px;height:30px;margin:10px auto;"></div>';
            videoIframe.style.display = 'none';
            videoPlaceholder.style.display = 'block';
            videoPlaceholder.innerHTML = '<span class="icon">⏳</span> Cargando...';

            playerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

            let animeData = null;
            let animeId = id;

            // Si no tenemos ID, buscar en la base de datos local
            if (!animeId) {
                const titleLower = title.toLowerCase();
                for (const [key, value] of Object.entries(ANIME_DB)) {
                    if (titleLower.includes(key) || key.includes(titleLower)) {
                        animeId = value;
                        break;
                    }
                }
            }

            if (!animeId) {
                // Intentar buscar por título en RapidAPI
                const searchResult = await searchAnime(title);
                if (searchResult && searchResult.data && searchResult.data.length > 0) {
                    animeData = searchResult.data[0];
                    animeId = animeData.id;
                }
            }

            if (!animeId) {
                episodeList.innerHTML = `
                            <div class="no-episodes">
                                <span class="icon">😅</span>
                                No se encontró el anime "${title}".<br>
                                <span style="font-size:0.8rem; color:#888;">
                                    Intenta con otro título o busca en <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(title)}+anime" target="_blank" style="color:#a78bfa;">YouTube</a>
                                </span>
                            </div>
                        `;
                playerStatus.textContent = 'No disponible';
                playerInfo.innerHTML = '❌ No se encontró el anime.';
                videoPlaceholder.innerHTML = '<span class="icon">😢</span> No disponible';
                return;
            }

            // Obtener datos del anime
            if (!animeData) {
                animeData = await fetchAnimeById(animeId);
            }

            if (!animeData) {
                episodeList.innerHTML = `
                            <div class="no-episodes">
                                <span class="icon">😅</span>
                                Error al cargar el anime "${title}".<br>
                                <span style="font-size:0.8rem; color:#888;">
                                    La API puede estar temporalmente no disponible.
                                </span>
                            </div>
                        `;
                playerStatus.textContent = 'Error';
                playerInfo.innerHTML = '❌ Error al cargar el anime.';
                videoPlaceholder.innerHTML = '<span class="icon">❌</span> Error';
                return;
            }

            // Mostrar información del anime
            const episodesCount = animeData.episodes || animeData.total_episodes || 24;
            const animeTitle = animeData.title || animeData.name || title;
            playerTitle.textContent = animeTitle;
            playerStatus.textContent = `${episodesCount} episodios disponibles`;
            playerInfo.innerHTML =
                `📺 <strong>${animeTitle}</strong> - ${episodesCount} episodios disponibles.`;

            // Generar lista de episodios
            const maxEp = Math.min(episodesCount, 100);
            let html = '';
            const perRow = 20;

            for (let i = 0; i < maxEp; i += perRow) {
                const batch = Math.min(i + perRow, maxEp);
                html += `<div style="display:flex;flex-wrap:wrap;gap:6px;width:100%;margin-bottom:4px;">`;
                for (let ep = i + 1; ep <= batch; ep++) {
                    html += `<button data-ep="${ep}" data-id="${animeId}">Ep ${ep}</button>`;
                }
                html += `</div>`;
            }

            episodeList.innerHTML = html;

            // Evento para cada botón
            episodeList.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const epNum = btn.dataset.ep;
                    const id = btn.dataset.id;

                    episodeList.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    // Intentar cargar el episodio desde la API
                    loadEpisode(id, epNum);
                });
            });

            // Auto-reproducir el primer episodio
            const firstBtn = episodeList.querySelector('button');
            if (firstBtn) {
                firstBtn.classList.add('active');
                setTimeout(() => firstBtn.click(), 500);
            }
        }

        // ============================================================
        // CARGAR EPISODIO
        // ============================================================
        async function loadEpisode(animeId, episodeNumber) {
            videoPlaceholder.style.display = 'block';
            videoPlaceholder.innerHTML = `<span class="icon">⏳</span> Cargando episodio ${episodeNumber}...`;
            videoIframe.style.display = 'none';
            playerStatus.textContent = `Cargando Episodio ${episodeNumber}...`;

            try {
                // Intentar obtener el enlace del episodio desde la API
                const response = await fetch(`https://animes5.p.rapidapi.com/anime/${animeId}/episode/${episodeNumber}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-rapidapi-host': RAPIDAPI_HOST,
                        'x-rapidapi-key': RAPIDAPI_KEY
                    }
                });

                if (!response.ok) {
                    throw new Error(`Error ${response.status}`);
                }

                const data = await response.json();

                if (data && data.video_url) {
                    // Si hay URL de video, reproducir
                    videoPlaceholder.style.display = 'none';
                    videoIframe.style.display = 'block';
                    videoIframe.src = data.video_url;
                    playerStatus.textContent = `Reproduciendo Episodio ${episodeNumber}`;
                    playerInfo.innerHTML =
                        `▶️ Reproduciendo <strong>Episodio ${episodeNumber}</strong> desde la API.`;
                } else {
                    // Si no hay video, buscar en YouTube
                    const searchQuery = encodeURIComponent(`${playerTitle.textContent} episodio ${episodeNumber}`);
                    videoPlaceholder.innerHTML = `
                                <span class="icon">🔗</span>
                                Episodio ${episodeNumber} no disponible en la API.<br>
                                <span style="font-size:0.8rem; color:#888;">
                                    Buscar en <a href="https://www.youtube.com/results?search_query=${searchQuery}" target="_blank" style="color:#a78bfa;">YouTube</a>
                                </span>
                            `;
                    playerStatus.textContent = `Episodio ${episodeNumber} no disponible`;
                }
            } catch (error) {
                console.error('Error loading episode:', error);
                // Fallback a YouTube
                const searchQuery = encodeURIComponent(`${playerTitle.textContent} episodio ${episodeNumber}`);
                videoPlaceholder.innerHTML = `
                            <span class="icon">🔗</span>
                            Error al cargar el episodio ${episodeNumber}.<br>
                            <span style="font-size:0.8rem; color:#888;">
                                Buscar en <a href="https://www.youtube.com/results?search_query=${searchQuery}" target="_blank" style="color:#a78bfa;">YouTube</a>
                            </span>
                        `;
                playerStatus.textContent = `Error en Episodio ${episodeNumber}`;
            }
        }

        // ============================================================
        // CARGA Y BÚSQUEDA
        // ============================================================

        async function loadAnimes(page = 1, query = '', append = false) {
            if (isLoading) return;
            isLoading = true;
            loadingEl.style.display = 'block';
            if (!append) grid.innerHTML = '';

            try {
                let animes = [];
                if (query) {
                    const result = await searchAnime(query);
                    if (result && result.data) {
                        animes = result.data;
                    }
                } else {
                    // Si no hay búsqueda, usar lista predefinida de animes populares
                    const popularIds = [5114, 5220, 16498, 46914, 48567, 35851, 40862, 40748, 40682, 39923];
                    const animePromises = popularIds.map(id => fetchAnimeById(id));
                    const results = await Promise.all(animePromises);
                    animes = results.filter(a => a !== null);
                }

                loadingEl.style.display = 'none';
                isLoading = false;

                if (animes.length === 0 && !append) {
                    renderAnimeList([]);
                    return;
                }
                renderAnimeList(animes, append);
            } catch (error) {
                console.error('Error loading animes:', error);
                loadingEl.style.display = 'none';
                isLoading = false;
                if (!append) {
                    grid.innerHTML =
                        `<p style="color:#888; text-align:center; grid-column:1/-1; padding:40px 0;">Error al cargar animes. Por favor, recarga la página.</p>`;
                }
            }
        }

        async function performSearch() {
            const query = searchInput.value.trim();
            currentQuery = query;
            currentPage = 1;
            await loadAnimes(currentPage, query, false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function loadMore() {
            if (isLoading || !hasMore) return;
            currentPage++;
            await loadAnimes(currentPage, currentQuery, true);
        }

        // ============================================================
        // EVENTOS
        // ============================================================

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') performSearch();
        });
        loadMoreBtn.addEventListener('click', loadMore);

        closeBtn.addEventListener('click', () => {
            playerSection.classList.remove('active');
            videoIframe.src = '';
            videoIframe.style.display = 'none';
            videoPlaceholder.style.display = 'block';
            videoPlaceholder.innerHTML = '<span class="icon">🎬</span> Selecciona un episodio para ver';
        });

        // ============================================================
        // INICIO
        // ============================================================

        loadAnimes(1, '', false);
    </script>
</body>
</html>
