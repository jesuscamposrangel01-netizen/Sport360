<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnimeStream Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@0.14.17/dist/hls.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #0a0e1a;
            color: #f0f4fa;
            padding: 12px;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }

        header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo i { font-size: 28px; background: linear-gradient(135deg, #f093fb, #f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-box {
            display: flex;
            background: rgba(255,255,255,0.06);
            border-radius: 50px;
            padding: 4px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            outline: none;
            min-width: 0;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.35); }
        .search-box button {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .search-box button:disabled { opacity: 0.5; }

        .status {
            margin: 16px 0 20px;
            padding: 14px 16px;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            text-align: center;
            font-size: 14px;
            color: #b0c4de;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .status .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.15); border-top-color: #f5576c; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status.error { color: #f87171; background: rgba(248,113,113,0.08); }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        .anime-card {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .anime-card:active { transform: scale(0.97); }
        .anime-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #151f2f;
        }
        .anime-card .info {
            padding: 12px 12px 14px;
        }
        .anime-card .info h3 {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .anime-card .info p {
            font-size: 12px;
            color: #8899bb;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111927;
            width: 100%;
            max-width: 500px;
            max-height: 95vh;
            border-radius: 24px;
            padding: 18px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .modal-close {
            float: right;
            font-size: 28px;
            color: #8899bb;
            cursor: pointer;
            padding: 0 6px;
            line-height: 1;
        }
        .modal-close:active { color: #fff; }
        .modal-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 14px;
            padding-right: 40px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .video-container video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
        }
        .episode-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 8px;
        }
        .episode-section strong { font-size: 16px; color: #b0c4de; }
        .episode-count { font-size: 13px; color: #8899bb; }
        .episode-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            max-height: 180px;
            overflow-y: auto;
            padding: 4px 2px;
        }
        .episode-btn {
            background: rgba(255,255,255,0.06);
            color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            touch-action: manipulation;
        }
        .episode-btn:active { transform: scale(0.95); }
        .episode-btn.active {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-color: transparent;
            color: #fff;
        }
        .episode-btn:disabled { opacity: 0.3; }
        .episode-list .loading-text { color: #8899bb; padding: 8px 0; }
        .episode-list .error-text { color: #f87171; }

        .fallback-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-fallback {
            background: rgba(255,255,255,0.05);
            color: #b0c4de;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            touch-action: manipulation;
        }
        .btn-fallback:active { background: rgba(255,255,255,0.12); }

        @media (max-width: 400px) {
            .anime-grid { gap: 10px; }
            .anime-card img { height: 160px; }
            .modal-content { padding: 14px; }
            .search-box button { padding: 8px 14px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><i class="fas fa-play-circle"></i> AnimeStream</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar anime..." />
                <button id="searchBtn"><i class="fas fa-search"></i> Buscar</button>
            </div>
        </header>
        <div class="status" id="status"><span class="spinner"></span> Cargando...</div>
        <div class="anime-grid" id="animeGrid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <h2 class="modal-title" id="modalTitle">Título</h2>
            <div class="video-container">
                <video id="videoPlayer" controls preload="metadata" playsinline></video>
            </div>
            <div class="episode-section">
                <strong><i class="fas fa-list"></i> Episodios</strong>
                <span class="episode-count" id="episodeCount"></span>
            </div>
            <div class="episode-list" id="episodeList"><span class="loading-text">⏳ Cargando...</span></div>
            <div class="fallback-buttons">
                <button class="btn-fallback" id="btnGogoanime"><i class="fas fa-external-link-alt"></i> Gogoanime</button>
                <button class="btn-fallback" id="btnAnimeFLV"><i class="fas fa-external-link-alt"></i> AnimeFLV</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://miruro-api-roan.vercel.app/api';
        const CATALOG = ['Naruto','One Piece','Demon Slayer','Jujutsu Kaisen','Attack on Titan','My Hero Academia','Death Note','Fullmetal Alchemist'];

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const statusDiv = document.getElementById('status');
        const grid = document.getElementById('animeGrid');
        const modal = document.getElementById('modal');
        const modalClose = document.getElementById('modalClose');
        const modalTitle = document.getElementById('modalTitle');
        const episodeList = document.getElementById('episodeList');
        const episodeCount = document.getElementById('episodeCount');
        const videoPlayer = document.getElementById('videoPlayer');
        const btnGogoanime = document.getElementById('btnGogoanime');
        const btnAnimeFLV = document.getElementById('btnAnimeFLV');

        let currentEpisodes = [];
        let currentTitle = '';
        let hls = null;

        function setStatus(msg, err = false, load = false) {
            statusDiv.innerHTML = load ? `<span class="spinner"></span> ${msg}` : msg;
            statusDiv.className = 'status' + (err ? ' error' : '');
        }

        function setLoading(l) {
            searchBtn.disabled = l;
            searchBtn.innerHTML = l ? '<i class="fas fa-spinner fa-pulse"></i>' : '<i class="fas fa-search"></i> Buscar';
        }

        async function loadCatalog() {
            setStatus('Cargando catálogo...', false, true);
            let all = [];
            for (const q of CATALOG) {
                try {
                    const r = await fetch(`${API_BASE}/search?query=${encodeURIComponent(q)}&per_page=2`);
                    if (!r.ok) continue;
                    const d = await r.json();
                    if (d.success && d.results?.results) {
                        for (const a of d.results.results) {
                            if (!all.some(x => x.id === a.id)) all.push(a);
                        }
                    }
                } catch(e) {}
            }
            if (all.length === 0) { setStatus('⚠️ Error al cargar catálogo', true); return; }
            setStatus(`✨ ${all.length} animes populares`);
            renderGrid(all);
        }

        async function searchAnime() {
            const q = searchInput.value.trim();
            if (!q) { setStatus('✍️ Escribe un nombre', true); return; }
            setLoading(true);
            setStatus(`Buscando "${q}"...`, false, true);
            grid.innerHTML = '';
            try {
                const r = await fetch(`${API_BASE}/search?query=${encodeURIComponent(q)}&per_page=20`);
                if (!r.ok) throw new Error('Error');
                const d = await r.json();
                if (!d.success || !d.results || d.results.results.length === 0) {
                    setStatus(`❌ Sin resultados para "${q}"`, true);
                    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:30px;color:#8899bb;">No se encontraron animes.</div>`;
                    return;
                }
                setStatus(`✅ ${d.results.results.length} resultados`);
                renderGrid(d.results.results);
            } catch(e) {
                setStatus('❌ Error de conexión', true);
            } finally { setLoading(false); }
        }

        function renderGrid(animes) {
            grid.innerHTML = animes.map(a => {
                const t = a.title?.romaji || a.title?.english || 'Sin título';
                const img = a.coverImage?.large || a.coverImage?.medium || '';
                const y = a.seasonYear || '';
                return `
                    <div class="anime-card" onclick="openAnime(${a.id}, '${t.replace(/'/g,"\\'")}')">
                        <img src="${img}" alt="${t}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23151f2f%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%238899bb%22 font-size=%2218%22 font-family=%22system-ui%22%3E${encodeURIComponent(t)}%3C/text%3E%3C/svg%3E'">
                        <div class="info"><h3>${t}</h3><p>${y}</p></div>
                    </div>
                `;
            }).join('');
        }

        async function openAnime(id, title) {
            currentTitle = title;
            modalTitle.textContent = title;
            modal.classList.add('active');
            episodeList.innerHTML = '<span class="loading-text">⏳ Cargando...</span>';
            episodeCount.textContent = '';
            if (hls) { hls.destroy(); hls = null; }
            videoPlayer.pause();
            videoPlayer.removeAttribute('src');
            videoPlayer.load();

            try {
                const r = await fetch(`${API_BASE}/episodes/${id}`);
                if (!r.ok) throw new Error('Error');
                const d = await r.json();
                if (d.success && d.results?.length > 0) {
                    currentEpisodes = d.results;
                    renderEpisodes(currentEpisodes);
                    return;
                }
                throw new Error('Sin episodios');
            } catch(e) {
                try {
                    const r = await fetch(`${API_BASE}/anime/gogoanime/info?query=${encodeURIComponent(title)}`);
                    if (!r.ok) throw new Error('Error Gogo');
                    const d = await r.json();
                    if (d.results?.episodes?.length > 0) {
                        currentEpisodes = d.results.episodes.map(ep => ({
                            id: ep.episodeId || ep.id,
                            number: ep.number || ep.episode,
                            title: ep.title || `Ep ${ep.number}`
                        }));
                        renderEpisodes(currentEpisodes);
                        return;
                    }
                    throw new Error('Sin episodios');
                } catch(e2) {
                    episodeList.innerHTML = `<span class="error-text">❌ No hay episodios disponibles</span>`;
                    episodeCount.textContent = 'Error';
                    setStatus('❌ No se encontraron episodios', true);
                }
            }
        }

        function renderEpisodes(eps) {
            episodeCount.textContent = `${eps.length} episodios`;
            episodeList.innerHTML = eps.map((ep, i) => {
                const n = ep.number || ep.episode || i+1;
                const t = ep.title ? ` - ${ep.title}` : '';
                return `<button class="episode-btn" data-index="${i}" onclick="playEpisode(${i})">${n}${t}</button>`;
            }).join('');
            if (eps.length > 0) playEpisode(0);
        }

        async function playEpisode(index) {
            if (index < 0 || index >= currentEpisodes.length) return;
            const ep = currentEpisodes[index];
            const num = ep.number || ep.episode || index+1;
            modalTitle.textContent = `${currentTitle} — Ep ${num}`;

            document.querySelectorAll('.episode-btn').forEach((b, i) => {
                b.classList.toggle('active', i === index);
                b.disabled = true;
            });

            const endpoints = [
                `${API_BASE}/anime/gogoanime/watch/${ep.id}`,
                `${API_BASE}/watch/${ep.id}`,
                `${API_BASE}/episodes/${ep.id}/sources`
            ];

            let videoUrl = null;
            for (const url of endpoints) {
                try {
                    const r = await fetch(url);
                    if (!r.ok) continue;
                    const d = await r.json();
                    let src = d.sources || d.results?.sources || d.data?.sources || [];
                    if (src.length === 0 && Array.isArray(d.results)) src = d.results;
                    if (src.length > 0) {
                        const s = src[0];
                        videoUrl = s.url || s.file || s.link;
                        if (videoUrl) break;
                    }
                } catch(e) {}
            }

            document.querySelectorAll('.episode-btn').forEach(b => b.disabled = false);

            if (videoUrl) {
                try {
                    // Usar HLS.js para .m3u8
                    if (videoUrl.includes('.m3u8') && Hls.isSupported()) {
                        if (hls) hls.destroy();
                        hls = new Hls();
                        hls.loadSource(videoUrl);
                        hls.attachMedia(videoPlayer);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
                    } else {
                        videoPlayer.src = videoUrl;
                        videoPlayer.load();
                        await videoPlayer.play();
                    }
                    setStatus(`▶️ Reproduciendo Ep ${num}`);
                    return;
                } catch(e) { console.warn('Error al reproducir:', e); }
            }

            if (confirm(`No se pudo cargar el video. ¿Abrir en Gogoanime?`)) {
                openInGogoanime();
            }
            setStatus(`❌ Error al reproducir Ep ${num}`, true);
        }

        function openInGogoanime() {
            window.open(`https://gogoanime3.net/search.html?keyword=${encodeURIComponent(currentTitle)}`, '_blank');
        }
        function openInAnimeFLV() {
            window.open(`https://animeflv.net/browse?q=${encodeURIComponent(currentTitle)}`, '_blank');
        }

        function closeModal() {
            modal.classList.remove('active');
            if (hls) { hls.destroy(); hls = null; }
            videoPlayer.pause();
            videoPlayer.removeAttribute('src');
            videoPlayer.load();
            currentEpisodes = [];
            setStatus('🔍 Busca otro anime');
        }

        searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') searchAnime(); });
        modalClose.addEventListener('click', closeModal);
        modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
        btnGogoanime.addEventListener('click', openInGogoanime);
        btnAnimeFLV.addEventListener('click', openInAnimeFLV);

        window.onload = loadCatalog;
    </script>
</body>
</html>
