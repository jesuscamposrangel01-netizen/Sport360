<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenshin | Anime Streaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #1a1a2e;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #a855f7;
        }
        .logo span {
            color: #fff;
        }
        .search-box {
            display: flex;
            gap: 8px;
        }
        .search-box input {
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid #2a2a4a;
            background: #1a1a2e;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            width: 250px;
        }
        .search-box input::placeholder {
            color: #666;
        }
        .search-box button {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            background: #a855f7;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
        .search-box button:hover {
            background: #7c3aed;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }
        .anime-card {
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .anime-card:hover {
            transform: translateY(-4px);
        }
        .anime-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }
        .anime-card .info {
            padding: 12px;
        }
        .anime-card .info h3 {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .anime-card .info p {
            font-size: 0.75rem;
            color: #888;
        }
        .player {
            margin-top: 24px;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            display: none;
        }
        .player.active {
            display: block;
        }
        .player .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        .player .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .player .episodes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }
        .player .episodes button {
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid #2a2a4a;
            background: transparent;
            color: #fff;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .player .episodes button:hover,
        .player .episodes button.active {
            background: #a855f7;
            border-color: #a855f7;
        }
        .close-btn {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .close-btn:hover {
            background: #dc2626;
        }
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 12px;
            }
            .search-box input {
                width: 100%;
            }
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .anime-card img {
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">ZEN<span>SHIN</span></div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar anime..." />
                <button id="searchBtn">Buscar</button>
            </div>
        </header>

        <div id="animeGrid" class="grid"></div>

        <div id="player" class="player">
            <button class="close-btn" id="closePlayer">✕ Cerrar</button>
            <div class="video-wrapper">
                <iframe id="videoIframe" src="" allowfullscreen></iframe>
            </div>
            <div class="episodes" id="episodeList"></div>
        </div>

        <div id="loading" style="text-align:center;padding:40px;color:#666;">Cargando animes...</div>
    </div>

    <script>
        // ============================================================
        // ZENSHIN - API SIMPLIFICADA (USANDO CONSUMET)
        // ============================================================
        const API = 'https://api-consumet-ochre.vercel.app';

        const grid = document.getElementById('animeGrid');
        const loading = document.getElementById('loading');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');

        const player = document.getElementById('player');
        const videoIframe = document.getElementById('videoIframe');
        const episodeList = document.getElementById('episodeList');
        const closeBtn = document.getElementById('closePlayer');

        let currentAnimeId = null;

        // ============================================================
        // CARGAR ANIMES POPULARES
        // ============================================================
        async function loadPopular() {
            loading.style.display = 'block';
            try {
                const res = await fetch(`${API}/anime/gogoanime/top-airing`);
                const data = await res.json();
                renderAnimes(data.results || []);
            } catch (e) {
                console.error(e);
                grid.innerHTML = '<p style="color:#666;grid-column:1/-1;text-align:center;">Error al cargar animes 😢</p>';
            }
            loading.style.display = 'none';
        }

        // ============================================================
        // BUSCAR ANIMES
        // ============================================================
        async function searchAnime(query) {
            loading.style.display = 'block';
            try {
                const res = await fetch(`${API}/anime/gogoanime/search?query=${encodeURIComponent(query)}`);
                const data = await res.json();
                renderAnimes(data.results || []);
            } catch (e) {
                console.error(e);
                grid.innerHTML = '<p style="color:#666;grid-column:1/-1;text-align:center;">Error al buscar 😢</p>';
            }
            loading.style.display = 'none';
        }

        // ============================================================
        // RENDERIZAR ANIMES
        // ============================================================
        function renderAnimes(animes) {
            if (!animes || animes.length === 0) {
                grid.innerHTML =
                '<p style="color:#666;grid-column:1/-1;text-align:center;">No se encontraron animes 😢</p>';
                return;
            }
            grid.innerHTML = animes.map(anime => `
                        <div class="anime-card" data-id="${anime.id}" data-title="${anime.title}">
                            <img src="${anime.image || 'https://via.placeholder.com/300x420/1a1a2e/666?text=No+Image'}" loading="lazy" />
                            <div class="info">
                                <h3>${anime.title || 'Sin título'}</h3>
                                <p>⭐ ${anime.rating || 'N/A'}</p>
                            </div>
                        </div>
                    `).join('');

            document.querySelectorAll('.anime-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.dataset.id;
                    const title = card.dataset.title;
                    openAnime(id, title);
                });
            });
        }

        // ============================================================
        // ABRIR ANIME (EPISODIOS)
        // ============================================================
        async function openAnime(id, title) {
            currentAnimeId = id;
            player.classList.add('active');
            player.scrollIntoView({ behavior: 'smooth', block: 'start' });

            episodeList.innerHTML = '<span style="color:#666;">Cargando episodios...</span>';
            videoIframe.src = '';

            try {
                const res = await fetch(`${API}/anime/gogoanime/episodes/${id}`);
                const data = await res.json();
                const episodes = data.episodes || [];

                if (episodes.length === 0) {
                    episodeList.innerHTML = '<span style="color:#666;">No hay episodios disponibles 😢</span>';
                    return;
                }

                episodeList.innerHTML = episodes.slice(0, 50).map(ep => `
                            <button data-id="${ep.id}">${ep.number}</button>
                        `).join('');

                // Auto-reproducir el primer episodio
                const firstBtn = episodeList.querySelector('button');
                if (firstBtn) {
                    firstBtn.classList.add('active');
                    loadEpisode(firstBtn.dataset.id);
                }

                episodeList.querySelectorAll('button').forEach(btn => {
                    btn.addEventListener('click', () => {
                        episodeList.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        loadEpisode(btn.dataset.id);
                    });
                });

            } catch (e) {
                console.error(e);
                episodeList.innerHTML = '<span style="color:#666;">Error al cargar episodios 😢</span>';
            }
        }

        // ============================================================
        // CARGAR EPISODIO
        // ============================================================
        async function loadEpisode(episodeId) {
            try {
                const res = await fetch(`${API}/anime/gogoanime/watch/${episodeId}`);
                const data = await res.json();
                const sources = data.sources || [];

                if (sources.length > 0) {
                    // Buscar .mp4 o primera fuente
                    const mp4 = sources.find(s => s.url?.endsWith('.mp4'));
                    const url = mp4 ? mp4.url : sources[0].url;
                    videoIframe.src = url;
                } else {
                    videoIframe.src = '';
                    alert('No se pudo cargar el episodio');
                }
            } catch (e) {
                console.error(e);
                alert('Error al cargar el episodio');
            }
        }

        // ============================================================
        // EVENTOS
        // ============================================================
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) searchAnime(query);
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchBtn.click();
        });

        closeBtn.addEventListener('click', () => {
            player.classList.remove('active');
            videoIframe.src = '';
        });

        // ============================================================
        // INICIO
        // ============================================================
        loadPopular();
    </script>
</body>
</html>
