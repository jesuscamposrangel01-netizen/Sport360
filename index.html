<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnimeVerse · Buscador con Consumet API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f1ea;
      color: #1e1e2a;
      padding: 0 20px;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 2px solid #e0d6c8;
      margin-bottom: 30px;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #f43b47, #ff6a88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo span {
      font-weight: 400;
      -webkit-text-fill-color: #1e1e2a;
      background: none;
    }
    nav a {
      text-decoration: none;
      color: #1e1e2a;
      font-weight: 600;
      margin-left: 25px;
      transition: color 0.2s;
    }
    nav a:hover { color: #f43b47; }
    .search-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 30px;
    }
    .search-wrapper {
      position: relative;
      width: 100%;
      max-width: 500px;
    }
    #search-input {
      width: 100%;
      padding: 14px 20px;
      border: 2px solid #d6cdc0;
      border-radius: 50px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      background: #ffffffcc;
      backdrop-filter: blur(4px);
    }
    #search-input:focus {
      border-color: #f43b47;
      box-shadow: 0 0 0 4px rgba(244, 59, 71, 0.15);
    }
    .search-status {
      margin-top: 10px;
      font-size: 14px;
      color: #7a7065;
      min-height: 24px;
    }
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 30px;
      max-width: 1300px;
      margin: 0 auto;
    }
    .anime-card {
      background: #ffffff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      transition: transform 0.25s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .anime-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
    }
    .anime-card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      background: #eae5dc;
    }
    .anime-card .card-body {
      padding: 18px 18px 22px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .anime-card .card-body h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .anime-card .card-body .year {
      font-size: 14px;
      color: #888080;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .anime-card .card-body p {
      font-size: 15px;
      line-height: 1.5;
      color: #3d3d4a;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .anime-card .card-body .tag {
      display: inline-block;
      margin-top: 14px;
      background: #f0ebe4;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      color: #6b5f55;
      align-self: flex-start;
    }
    .watch-btn {
      margin-top: 12px;
      background: #f43b47;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 14px;
    }
    .watch-btn:hover {
      background: #d32f2f;
    }
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      color: #8f8479;
      padding: 60px 0;
    }
    .loading {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 18px;
      color: #7a7065;
      padding: 40px 0;
    }
    .error-message {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 16px;
      color: #d32f2f;
      padding: 20px 0;
      background: #ffebee;
      border-radius: 12px;
      margin: 10px 0;
    }
    footer {
      text-align: center;
      padding: 40px 0 20px;
      margin-top: 40px;
      border-top: 2px solid #e0d6c8;
      color: #7a7065;
      font-size: 14px;
    }
    footer a {
      color: #f43b47;
      text-decoration: none;
      font-weight: 600;
    }
    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; gap: 12px; }
      nav a { margin-left: 0; margin-right: 20px; }
      .anime-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
      .anime-card img { height: 220px; }
    }
    @media (max-width: 420px) {
      .anime-grid { grid-template-columns: 1fr; }
      .anime-card img { height: 280px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Anime<span>Verse</span></div>
    <nav>
      <a href="#">Inicio</a>
      <a href="#">Populares</a>
      <a href="#">Próximos</a>
    </nav>
  </header>

  <div class="search-section">
    <div class="search-wrapper">
      <input type="text" id="search-input" placeholder="🔍 Busca tu anime favorito..." />
    </div>
    <div class="search-status" id="search-status">Escribe para buscar (ej: Naruto)</div>
  </div>

  <div class="anime-grid" id="anime-grid">
    <!-- Los resultados se pintan aquí -->
  </div>

  <footer>
    <p>© 2026 AnimeVerse · Hecho con ❤️ · Datos de <a href="https://myanimelist.net" target="_blank">MyAnimeList</a> vía <a href="https://consumet-api.vercel.app" target="_blank">Consumet API</a></p>
  </footer>

  <script>
    // ----- TU API EN VERCEL -----
    const API_URL = "https://consumet-api.vercel.app";

    // ----- ELEMENTOS DOM -----
    const searchInput = document.getElementById('search-input');
    const grid = document.getElementById('anime-grid');
    const status = document.getElementById('search-status');

    let timeoutId = null;
    let isFetching = false;

    // ----- FUNCIÓN PARA RENDERIZAR ANIMES -----
    function renderAnimes(animeList) {
      grid.innerHTML = '';

      if (!animeList || animeList.length === 0) {
        grid.innerHTML = '<div class="no-results">😕 No se encontraron animes para esa búsqueda.</div>';
        return;
      }

      animeList.forEach(anime => {
        const card = document.createElement('div');
        card.className = 'anime-card';

        // Datos de Consumet (estructura de /meta/anilist)
        const title = anime.title?.romaji || anime.title?.english || 'Sin título';
        const year = anime.releaseDate || anime.year || 'Desconocido';
        const synopsis = anime.description || anime.synopsis || 'Sin sinopsis disponible.';
        const genre = anime.genres?.[0] || 'Sin género';
        const imageUrl = anime.image || anime.coverImage || '';

        const animeId = anime.id; // ID de AniList para obtener episodios

        card.innerHTML = `
          <img src="${imageUrl}" alt="${title}" loading="lazy" 
               onerror="this.src='https://via.placeholder.com/250x320/d6cdc0/7a7065?text=${encodeURIComponent(title)}'" />
          <div class="card-body">
            <h3>${title}</h3>
            <div class="year">${year}</div>
            <p>${synopsis}</p>
            <span class="tag">${genre}</span>
            <button class="watch-btn" data-id="${animeId}" data-title="${title}">▶ Ver episodios</button>
          </div>
        `;

        grid.appendChild(card);
      });

      // Agregar eventos a los botones "Ver episodios"
      document.querySelectorAll('.watch-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const id = e.target.dataset.id;
          const title = e.target.dataset.title;
          await fetchEpisodes(id, title);
        });
      });
    }

    // ----- FUNCIÓN PARA OBTENER EPISODIOS Y MOSTRAR ENLACES -----
    async function fetchEpisodes(animeId, animeTitle) {
      try {
        setStatus(`⏳ Cargando episodios de "${animeTitle}"...`);
        
        // 1. Obtener lista de episodios
        const episodesRes = await fetch(`${API_URL}/meta/anilist/episodes/${animeId}`);
        if (!episodesRes.ok) throw new Error('Error al obtener episodios');
        const episodesData = await episodesRes.json();
        const episodes = episodesData.episodes || [];

        if (episodes.length === 0) {
          setStatus(`❌ No hay episodios disponibles para "${animeTitle}"`, true);
          return;
        }

        // 2. Tomar el primer episodio (o mostrar lista)
        const firstEp = episodes[0];
        // 3. Obtener enlace de video desde Gogoanime
        const watchRes = await fetch(`${API_URL}/anime/gogoanime/watch/${firstEp.id}`);
        if (!watchRes.ok) throw new Error('Error al obtener enlace de video');
        const watchData = await watchRes.json();
        
        const sources = watchData.sources || [];
        const videoUrl = sources.length > 0 ? sources[0].url : null;

        if (videoUrl) {
          // Abrir el video en una nueva pestaña (o podrías usar un reproductor embebido)
          window.open(videoUrl, '_blank');
          setStatus(`🎬 Reproduciendo "${firstEp.title || 'Episodio 1'}" de "${animeTitle}"`);
        } else {
          setStatus(`❌ No se pudo obtener el enlace del video para "${animeTitle}"`, true);
        }

      } catch (error) {
        console.error(error);
        setStatus(`❌ Error al cargar episodios: ${error.message}`, true);
      }
    }

    // ----- FUNCIÓN PARA MOSTRAR ESTADO -----
    function setStatus(text, isError = false) {
      status.textContent = text;
      status.style.color = isError ? '#d32f2f' : '#7a7065';
    }

    // ----- BÚSQUEDA CON DEBOUNCE -----
    function performSearch(query) {
      if (timeoutId) {
        clearTimeout(timeoutId);
        timeoutId = null;
      }

      if (!query.trim()) {
        grid.innerHTML = '';
        setStatus('✏️ Escribe para buscar (ej: Naruto)');
        return;
      }

      timeoutId = setTimeout(async () => {
        if (isFetching) return;
        isFetching = true;
        setStatus('⏳ Buscando...');

        try {
          // Usar el endpoint /meta/anilist de Consumet
          const url = `${API_URL}/meta/anilist/${encodeURIComponent(query)}?perPage=12`;
          const response = await fetch(url);

          if (!response.ok) {
            throw new Error(`Error HTTP: ${response.status}`);
          }

          const data = await response.json();
          const results = data.results || [];

          if (results.length === 0) {
            renderAnimes([]);
            setStatus(`🔍 No hay resultados para "${query}"`);
          } else {
            renderAnimes(results);
            setStatus(`✅ Mostrando ${results.length} resultados para "${query}"`);
          }

        } catch (error) {
          console.error('Error al buscar:', error);
          grid.innerHTML = `<div class="error-message">⚠️ Ocurrió un error al buscar. Intenta de nuevo más tarde.</div>`;
          setStatus('❌ Error de conexión', true);
        } finally {
          isFetching = false;
          timeoutId = null;
        }
      }, 500);
    }

    // ----- EVENTO DE INPUT -----
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value;
      performSearch(query);
    });

    // ----- CARGA INICIAL -----
    window.addEventListener('load', () => {
      grid.innerHTML = `
        <div class="no-results" style="padding: 30px 0; font-size: 18px;">
          🌟 Busca tu anime favorito usando el buscador.
        </div>
      `;
    });
  </script>
</body>
</html>
