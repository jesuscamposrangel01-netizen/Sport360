<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineStar · 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET Y ESTILOS GLOBALES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', system-ui, sans-serif; }
        body {
            background: #07070e;
            color: #f0f0f0;
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(229,9,20,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0,200,255,0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(245,197,24,0.02) 0%, transparent 80%);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 10px; }

        /* ===== HEADER ===== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: rgba(7,7,14,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #e50914, #ff4d4d, #f5c518);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo .year {
            -webkit-text-fill-color: rgba(255,255,255,0.05);
            font-size: 0.6rem;
            font-weight: 700;
            background: rgba(255,255,255,0.03);
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.04);
            letter-spacing: 2px;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border-radius: 60px;
            padding: 4px 4px 4px 20px;
            border: 1px solid rgba(255,255,255,0.04);
            width: 100%;
            max-width: 400px;
            transition: 0.4s ease;
        }
        .search-box:focus-within { border-color: rgba(229,9,20,0.3); box-shadow: 0 0 40px rgba(229,9,20,0.05); }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            min-width: 80px;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.15); font-weight: 300; }
        .search-box button {
            background: linear-gradient(135deg, #e50914, #b20710);
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 4px 20px rgba(229,9,20,0.15);
            letter-spacing: 0.5px;
        }
        .search-box button:hover { transform: scale(1.04); box-shadow: 0 6px 30px rgba(229,9,20,0.25); }

        /* ===== NAV TABS ===== */
        .nav-tabs {
            display: flex;
            gap: 4px;
            padding: 6px 8px;
            margin: 0 20px 16px;
            background: rgba(255,255,255,0.02);
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.03);
            flex-wrap: wrap;
            backdrop-filter: blur(10px);
        }
        .nav-tab {
            background: none;
            border: none;
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 18px;
            border-radius: 40px;
            transition: 0.4s ease;
            letter-spacing: 0.3px;
        }
        .nav-tab:hover { color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.03); }
        .nav-tab.active { color: #fff; background: rgba(229,9,20,0.15); box-shadow: 0 0 30px rgba(229,9,20,0.05); }
        .nav-tab .emoji { margin-right: 6px; }

        /* ===== HERO / CARTELERA ===== */
        .hero {
            margin: 0 20px 24px;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            background: linear-gradient(145deg, #0d0d1a, #1a0a12);
            aspect-ratio: 16/5.5;
            min-height: 150px;
            display: flex;
            align-items: center;
            padding: 24px 40px;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(7,7,14,0.7) 0%, transparent 60%);
            pointer-events: none;
        }
        .hero-content { position: relative; z-index: 2; max-width: 55%; }
        .hero-content .tag {
            font-size: 0.55rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.08);
            margin-bottom: 4px;
        }
        .hero-content h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #fff, rgba(255,255,255,0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.05;
        }
        .hero-content p {
            color: rgba(255,255,255,0.25);
            font-size: 0.85rem;
            margin-top: 6px;
            max-width: 420px;
            line-height: 1.5;
        }
        .hero-content .btn-hero {
            margin-top: 14px;
            background: linear-gradient(135deg, #e50914, #b20710);
            border: none;
            color: #fff;
            padding: 12px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 4px 25px rgba(229,9,20,0.2);
        }
        .hero-content .btn-hero:hover { transform: scale(1.04); box-shadow: 0 6px 35px rgba(229,9,20,0.3); }
        .hero-poster {
            position: absolute;
            right: 30px;
            bottom: -10px;
            width: 150px;
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            aspect-ratio: 2/3;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.04);
            z-index: 2;
            transition: 0.5s ease;
        }
        .hero:hover .hero-poster { transform: scale(1.02) rotate(-1deg); }

        /* ===== SECCIONES ===== */
        .section {
            padding: 0 20px;
            margin-bottom: 30px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .section-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-header h2 .badge {
            font-size: 0.5rem;
            background: linear-gradient(135deg, #e50914, #b20710);
            padding: 3px 14px;
            border-radius: 40px;
            color: #fff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .section-header .ver-todo {
            color: rgba(255,255,255,0.12);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 0.5px;
        }
        .section-header .ver-todo:hover { color: rgba(255,255,255,0.4); }

        /* ===== GRID ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        .card {
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.5s cubic-bezier(0.25,0.8,0.25,1);
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(229,9,20,0.12);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
            transition: 0.4s ease;
        }
        .card:hover img { transform: scale(1.03); }
        .card .info { padding: 14px 14px 16px; }
        .card .info h4 {
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #f0f0f0;
            letter-spacing: -0.2px;
        }
        .card .info p {
            color: #f5c518;
            font-size: 0.7rem;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card .info .year { color: rgba(255,255,255,0.1); font-size: 0.65rem; }

        /* ===== CANALES TV ===== */
        .tv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .tv-card {
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
        }
        .tv-card:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(229,9,20,0.15);
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .tv-card .icono { font-size: 3rem; margin-bottom: 8px; display: block; }
        .tv-card .nombre { font-weight: 700; font-size: 0.95rem; letter-spacing: -0.3px; }
        .tv-card .categoria { color: rgba(255,255,255,0.15); font-size: 0.7rem; margin-top: 4px; }

        /* ===== REPRODUCTOR ===== */
        .reproductor {
            display: none;
            margin: 20px 20px 30px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(50px);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
        }
        .reproductor.active { display: block; animation: fadeSlide 0.6s ease; }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            background: rgba(0,0,0,0.3);
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .player-header .btn-back {
            background: none;
            border: none;
            color: #e50914;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .player-header .btn-back:hover { color: #ff4d4d; transform: scale(1.04); }
        .player-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .player-controls select {
            background: rgba(255,255,255,0.03);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.04);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            outline: none;
        }
        .player-controls button {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.3);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .player-controls button:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .player-video {
            width: 100%;
            height: 65vh;
            min-height: 320px;
            background: #000;
            position: relative;
        }
        .player-video iframe, .player-video video {
            width: 100%;
            height: 100%;
            border: none;
        }
        .player-video .cargando {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.5);
            padding: 24px 36px;
            border-radius: 60px;
            text-align: center;
            backdrop-filter: blur(30px);
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .player-video .cargando .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.03);
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .player-footer {
            padding: 16px 24px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.02);
        }
        .player-footer h3 { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.3px; }
        .player-footer p {
            color: rgba(255,255,255,0.15);
            font-size: 0.85rem;
            margin-top: 4px;
            line-height: 1.5;
        }
        .player-footer .info-extra {
            color: rgba(0,255,136,0.2);
            font-size: 0.7rem;
            margin-top: 6px;
        }

        /* ===== LOADER INFINITO ===== */
        .loader-infinito {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.05);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .loader-infinito .spinner-mini {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.03);
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .hero { aspect-ratio: 16/8; padding: 20px 24px; min-height: 120px; }
            .hero-content h1 { font-size: 2rem; }
            .hero-content p { display: none; }
            .hero-poster { width: 100px; right: 16px; bottom: -6px; }
            .hero-content { max-width: 65%; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
            .tv-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .player-video { height: 45vh; min-height: 220px; }
            .logo { font-size: 1.8rem; }
            .search-box { max-width: 100%; }
            .search-box input { font-size: 0.85rem; padding: 10px 0; }
            .search-box button { padding: 8px 18px; font-size: 0.75rem; }
            .nav-tabs { padding: 4px 6px; margin: 0 12px 12px; }
            .nav-tab { font-size: 0.7rem; padding: 6px 12px; }
            .section { padding: 0 12px; }
            .reproductor { margin: 12px; }
            .player-header { padding: 10px 16px; }
        }
        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
            .hero { aspect-ratio: 16/10; padding: 14px 16px; min-height: 100px; }
            .hero-content h1 { font-size: 1.4rem; }
            .hero-poster { width: 70px; right: 10px; bottom: -4px; }
            .tv-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
            .card .info h4 { font-size: 0.75rem; }
            .player-video { height: 35vh; min-height: 180px; }
            .nav-tab { font-size: 0.6rem; padding: 4px 8px; }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="logo">
            🎬 CineStar
            <span class="year">2026</span>
        </div>
        <div class="search-box">
            <input id="buscador" type="text" placeholder="Buscar películas, series, canales...">
            <button id="btnBuscar">Buscar</button>
        </div>
    </header>

    <!-- ===== NAV TABS ===== -->
    <div class="nav-tabs" id="navTabs">
        <button class="nav-tab active" data-tipo="movie"><span class="emoji">🎬</span>Películas</button>
        <button class="nav-tab" data-tipo="espanol"><span class="emoji">🇪🇸</span>Películas Español</button>
        <button class="nav-tab" data-tipo="tv"><span class="emoji">📺</span>Series</button>
        <button class="nav-tab" data-tipo="tv_es"><span class="emoji">🇪🇸</span>Series Español</button>
        <button class="nav-tab" data-tipo="anime"><span class="emoji">🎌</span>Anime</button>
        <button class="nav-tab" data-tipo="canales"><span class="emoji">📡</span>Canales TV</button>
    </div>

    <!-- ===== HERO ===== -->
    <div class="hero" id="hero">
        <div class="hero-content">
            <div class="tag">★ Destacado</div>
            <h1 id="heroTitulo">CineStar</h1>
            <p id="heroDesc">+5000 películas, series, anime y canales de TV en vivo. Todo en español.</p>
            <button class="btn-hero" id="btnHero">Ver ahora</button>
        </div>
        <img id="heroPoster" class="hero-poster" src="https://image.tmdb.org/t/p/w300/8s4h9fP8ZxQ5ZxQ5ZxQ5ZxQ5ZxQ5.jpg" alt="Poster">
    </div>

    <!-- ===== SECCIÓN PRINCIPAL ===== -->
    <div class="section" id="seccionPrincipal">
        <div class="section-header">
            <h2 id="tituloSeccion">📌 Populares <span class="badge">🔥</span></h2>
            <span class="ver-todo" id="verTodo">Ver todo</span>
        </div>
        <div id="grid" class="grid"></div>
        <div class="loader-infinito" id="loaderInfinito">
            <div class="spinner-mini"></div> Cargando más...
        </div>
    </div>

    <!-- ===== REPRODUCTOR ===== -->
    <div id="reproductor" class="reproductor">
        <div class="player-header">
            <button class="btn-back" id="btnCerrarReproductor">← Volver</button>
            <div class="player-controls">
                <span style="color:#e50914;font-weight:700;font-size:0.7rem;">HD</span>
                <select id="sourceSelector">
                    <option value="auto">🤖 Auto</option>
                    <option value="2embed.skin">2embed.skin</option>
                    <option value="vidsrc.in">vidsrc.in</option>
                    <option value="vidlink.pro">vidlink.pro</option>
                    <option value="vidsrc.pm">vidsrc.pm</option>
                    <option value="vidfast.pro">vidfast.pro</option>
                    <option value="vidsrc.xyz">vidsrc.xyz</option>
                    <option value="vidsrc.cc">vidsrc.cc</option>
                </select>
                <button id="btnRecargar">🔄</button>
                <button id="btnSiguiente">⏩</button>
            </div>
        </div>
        <div class="player-video" id="playerVideo">
            <div class="cargando" id="loadingVideo">
                <div class="spinner"></div>
                <span id="loadingText">Cargando...</span>
            </div>
            <iframe id="iframeVideo" src="" allowfullscreen></iframe>
            <video id="videoPlayer" controls playsinline style="display:none;"></video>
        </div>
        <div class="player-footer">
            <h3 id="peliTitulo">Título</h3>
            <p id="peliSinopsis">Sinopsis...</p>
            <div class="info-extra" id="fuenteInfo"></div>
        </div>
    </div>

    <script>
        // ================================================================
        // CONFIGURACIÓN
        // ================================================================
        const API_KEY = 'bda7a5fa2507ebcef3fcebd2287d72c9';
        const BASE_IMG = 'https://image.tmdb.org/t/p/w300';

        const FUENTES = {

            { nombre: 'TCM (Cine Clásico)', icono: '🎞️', stream: 'https://tcm-esp.live.hoola.tv/tcm-esp/playlist.m3u8', categoria: 'Cine' },
            { nombre: 'France 24 Español', icono: '🇫🇷', stream: 'https://cdn-1.live.hoola.tv/france24-es/playlist.m3u8', categoria: 'Noticias' },
            { nombre: 'DW Español', icono: '🇩🇪', stream: 'https://dw-esp.live.hoola.tv/dw-esp/playlist.m3u8', categoria: 'Noticias' },
            { nombre: 'TeleSUR', icono: '🌎', stream: 'https://cdn-1.live.hoola.tv/telesur/playlist.m3u8', categoria: 'Noticias' },
            { nombre: 'Canal 24h (RTVE)', icono: '🇪🇸', stream: 'https://rtve-24h-live.hls.adaptive.level3.net/hls/24h/playlist.m3u8', categoria: 'Noticias' },
            { nombre: 'Canal Sur', icono: '🇪🇸', stream: 'https://cdn-1.live.hoola.tv/canalsur/playlist.m3u8', categoria: 'Regional' }
        ];

        // ================================================================
        // DOM
        // ================================================================
        const grid = document.getElementById('grid');
        const buscador = document.getElementById('buscador');
        const btnBuscar = document.getElementById('btnBuscar');
        const tituloSeccion = document.getElementById('tituloSeccion');
        const verTodo = document.getElementById('verTodo');
        const reproductor = document.getElementById('reproductor');
        const iframe = document.getElementById('iframeVideo');
        const videoPlayer = document.getElementById('videoPlayer');
        const loadingVideo = document.getElementById('loadingVideo');
        const loadingText = document.getElementById('loadingText');
        const peliTitulo = document.getElementById('peliTitulo');
        const peliSinopsis = document.getElementById('peliSinopsis');
        const fuenteInfo = document.getElementById('fuenteInfo');
        const sourceSelector = document.getElementById('sourceSelector');
        const btnRecargar = document.getElementById('btnRecargar');
        const btnSiguiente = document.getElementById('btnSiguiente');
        const btnCerrarReproductor = document.getElementById('btnCerrarReproductor');
        const navTabs = document.querySelectorAll('.nav-tab');
        const heroTitulo = document.getElementById('heroTitulo');
        const heroDesc = document.getElementById('heroDesc');
        const heroPoster = document.getElementById('heroPoster');
        const btnHero = document.getElementById('btnHero');
        const loaderInfinito = document.getElementById('loaderInfinito');

        let allItems = [];
        let currentPage = 1;
        let currentTipo = 'movie';
        let modoBusqueda = false;
        let currentSerieId = null;
        let currentSeason = null;
        let currentEpisode = null;
        let currentSerieData = null;
        let idxFuenteActual = 0;
        let timeoutBusqueda = null;
        let fuentesActuales = [];
        let timeoutAuto = null;
        let cargandoMas = false;
        let esTV = false;
        const MAX_PAGES = 500;

        // ================================================================
        // API
        // ================================================================
        async function fetchApi(endpoint, extra = '') {
            let url = `https://api.themoviedb.org/3/${endpoint}?api_key=${API_KEY}&language=es-MX`;
            if (extra) url += `&${extra}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Error ${res.status}`);
            return res.json();
        }

        // ================================================================
        // CARGAR PÁGINA
        // ================================================================
        async function cargarPagina(page = 1) {
            try {
                let endpoint, extra = `page=${page}`;
                if (currentTipo === 'movie') { endpoint = 'movie/popular'; }
                else if (currentTipo === 'espanol') { endpoint = 'discover/movie'; extra += `&with_original_language=es&sort_by=popularity.desc`; }
                else if (currentTipo === 'tv') { endpoint = 'tv/popular'; }
                else if (currentTipo === 'tv_es') { endpoint = 'discover/tv'; extra += `&with_original_language=es&sort_by=popularity.desc`; }
                else if (currentTipo === 'anime') { endpoint = 'discover/tv'; extra += `&with_genres=16&with_original_language=ja`; }
                else { return false; }

                const data = await fetchApi(endpoint, extra);
                const nuevos = data.results || [];
                if (page === 1) allItems = nuevos;
                else allItems = allItems.concat(nuevos);
                if (!modoBusqueda) {
                    renderGrid(allItems);
                    actualizarHero(allItems);
                }
                return nuevos.length > 0;
            } catch (e) {
                grid.innerHTML = `<p style="color:#e50914;text-align:center;padding:30px;">❌ Error: ${e.message}</p>`;
                return false;
            }
        }

        // ================================================================
        // CARGAR CANALES TV
        // ================================================================
        function cargarCanalesTV() {
            grid.innerHTML = CANALES_TV.map(c => `
                <div class="tv-card" data-stream="${c.stream}" data-nombre="${c.nombre}" data-categoria="${c.categoria}">
                    <span class="icono">${c.icono}</span>
                    <div class="nombre">${c.nombre}</div>
                    <div class="categoria">${c.categoria}</div>
                </div>
            `).join('');

            document.querySelectorAll('.tv-card').forEach(card => {
                card.addEventListener('click', () => {
                    const stream = card.dataset.stream;
                    const nombre = card.dataset.nombre;
                    const categoria = card.dataset.categoria;
                    reproducirTV(stream, nombre, categoria);
                });
            });

            // Ocultar loader
            loaderInfinito.style.display = 'none';
            verTodo.style.display = 'none';
            tituloSeccion.innerHTML = '📡 Canales de TV <span class="badge">📺</span>';
            actualizarHeroTV();
        }

        function actualizarHeroTV() {
            heroTitulo.textContent = '📡 Canales de TV en Vivo';
            heroDesc.textContent = 'Selecciona un canal de la lista para empezar a ver en directo.';
            heroPoster.style.display = 'none';
            btnHero.style.display = 'none';
        }

        // ================================================================
        // REPRODUCIR TV
        // ================================================================
        function reproducirTV(stream, nombre, categoria) {
            reproductor.classList.add('active');
            peliTitulo.textContent = `${nombre} (${categoria})`;
            peliSinopsis.textContent = '📡 Transmisión en vivo. Disfruta de este canal de televisión.';
            fuenteInfo.textContent = '🔴 En vivo · Fuente: ' + stream;

            // Usar video nativo para HLS
            iframe.style.display = 'none';
            videoPlayer.style.display = 'block';
            loadingVideo.style.display = 'flex';
            loadingText.textContent = '🔴 Conectando al canal...';

            // Cargar HLS.js si está disponible
            if (typeof Hls !== 'undefined') {
                const hls = new Hls();
                hls.loadSource(stream);
                hls.attachMedia(videoPlayer);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    videoPlayer.play().catch(() => {});
                    loadingVideo.style.display = 'none';
                });
                hls.on(Hls.Events.ERROR, () => {
                    loadingVideo.style.display = 'none';
                    peliSinopsis.textContent = '⚠️ No se pudo conectar al canal. Prueba otro.';
                });
            } else {
                // Fallback: usar el stream directamente
                videoPlayer.src = stream;
                videoPlayer.play().catch(() => {
                    loadingVideo.style.display = 'none';
                    peliSinopsis.textContent = '⚠️ Tu navegador no soporta HLS.';
                });
                loadingVideo.style.display = 'none';
            }

            reproductor.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ================================================================
        // ACTUALIZAR HERO
        // ================================================================
        function actualizarHero(lista) {
            if (!lista || lista.length === 0) return;
            const destacado = lista.find(item => item.poster_path) || lista[0];
            const titulo = destacado.title || destacado.name || 'CineStar';
            const desc = destacado.overview || 'Descubre el mejor contenido.';
            heroTitulo.textContent = titulo;
            heroDesc.textContent = desc.length > 120 ? desc.slice(0, 120) + '...' : desc;
            if (destacado.poster_path) {
                heroPoster.src = BASE_IMG + destacado.poster_path;
                heroPoster.style.display = 'block';
            }
            btnHero.style.display = 'inline-block';
            btnHero.onclick = () => {
                const id = destacado.id;
                const tipo = destacado.media_type === 'movie' || (destacado.title && !destacado.name) ? 'movie' : 'tv';
                const tituloCard = destacado.title || destacado.name;
                const sinopsis = destacado.overview || '';
                if (tipo === 'movie') {
                    reproducirPelicula(id, tituloCard, sinopsis);
                } else {
                    // Para series, cargar primera temporada
                    cargarTemporadas(id, tituloCard, sinopsis);
                }
            };
        }

        // ================================================================
        // RENDER GRID
        // ================================================================
        function renderGrid(lista) {
            if (!lista || lista.length === 0) {
                grid.innerHTML = `<p style="color:rgba(255,255,255,0.05);text-align:center;padding:40px;">No hay resultados.</p>`;
                return;
            }
            grid.innerHTML = lista.map(item => {
                const esPelicula = item.media_type === 'movie' || (item.title && !item.name);
                const titulo = esPelicula ? item.title : item.name;
                const fecha = esPelicula ? item.release_date : item.first_air_date;
                const año = fecha ? fecha.split('-')[0] : '';
                const id = item.id;
                const tipo = esPelicula ? 'movie' : 'tv';
                const idiomaOriginal = item.original_language || '';
                const esEspanol = idiomaOriginal === 'es' || idiomaOriginal === 'la';
                return `
                    <div class="card" data-id="${id}" data-titulo="${titulo}" data-sinopsis="${item.overview || ''}" data-tipo="${tipo}">
                        <img src="${item.poster_path ? BASE_IMG + item.poster_path : 'https://via.placeholder.com/300x450/222/555?text=No+Image'}" alt="${titulo}" loading="lazy">
                        <div class="info">
                            <h4>${titulo}</h4>
                            <p>⭐ ${item.vote_average?.toFixed(1) || 'N/A'} <span class="year">${año}</span></p>
                            ${esEspanol ? '<span style="color:#00ff88;font-size:0.55rem;margin-left:6px;">🎙️</span>' : ''}
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.dataset.id;
                    const titulo = card.dataset.titulo;
                    const sinopsis = card.dataset.sinopsis;
                    const tipo = card.dataset.tipo;
                    if (tipo === 'movie') {
                        reproducirPelicula(id, titulo, sinopsis);
                    } else {
                        cargarTemporadas(id, titulo, sinopsis);
                    }
                });
            });
        }

        // ================================================================
        // REPRODUCIR PELÍCULA
        // ================================================================
        function reproducirPelicula(id, titulo, sinopsis) {
            currentSerieId = id;
            currentSerieData = { titulo, sinopsis };
            currentSeason = null;
            currentEpisode = null;
            currentTipo = document.querySelector('.nav-tab.active')?.dataset?.tipo || 'movie';

            peliTitulo.textContent = titulo;
            peliSinopsis.textContent = sinopsis || 'Sin sinopsis.';
            fuenteInfo.textContent = '';
            videoPlayer.style.display = 'none';
            iframe.style.display = 'block';

            reproductor.classList.add('active');
            loadingVideo.style.display = 'flex';
            loadingText.textContent = '🔍 Buscando fuente...';

            fuentesActuales = FUENTES[currentTipo] || FUENTES.movie;

            if (sourceSelector.value === 'auto') {
                buscarFuenteAuto(id, 'movie');
            } else {
                const dominio = sourceSelector.value;
                const url = `https://${dominio}/embed/movie/${id}`;
                iframe.src = url;
                fuenteInfo.textContent = `🔧 Fuente: ${dominio}`;
                loadingVideo.style.display = 'none';
            }
            reproductor.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ================================================================
        // BUSCAR FUENTE AUTO
        // ================================================================
        function buscarFuenteAuto(id, tipo = 'movie', season = null, episode = null) {
            idxFuenteActual = 0;
            probarSiguienteFuente(id, tipo, season, episode);
        }

        function probarSiguienteFuente(id, tipo, season, episode) {
            if (idxFuenteActual >= fuentesActuales.length) {
                loadingVideo.style.display = 'none';
                fuenteInfo.textContent = '❌ No se encontró ninguna fuente.';
                peliSinopsis.textContent = '⚠️ No se pudo encontrar un enlace. Prueba manual.';
                return;
            }
            const dominio = fuentesActuales[idxFuenteActual];
            let url = tipo === 'movie' ? `https://${dominio}/embed/movie/${id}` : `https://${dominio}/embed/tv/${id}/${season}/${episode}`;
            loadingText.textContent = `🔍 Probando ${idxFuenteActual+1}/${fuentesActuales.length}: ${dominio}...`;
            iframe.src = url;
            if (timeoutAuto) clearTimeout(timeoutAuto);
            iframe.onload = () => {
                clearTimeout(timeoutAuto);
                loadingVideo.style.display = 'none';
                fuenteInfo.textContent = `✅ Fuente: ${dominio}`;
                iframe.onload = null;
                iframe.onerror = null;
            };
            iframe.onerror = () => {
                clearTimeout(timeoutAuto);
                idxFuenteActual++;
                probarSiguienteFuente(id, tipo, season, episode);
                iframe.onerror = null;
            };
            timeoutAuto = setTimeout(() => {
                iframe.onload = null;
                iframe.onerror = null;
                idxFuenteActual++;
                probarSiguienteFuente(id, tipo, season, episode);
            }, 5000);
        }

        // ================================================================
        // FUNCIONES REPRODUCTOR
        // ================================================================
        function recargar() {
            if (currentSerieId && !currentSeason) {
                reproducirPelicula(currentSerieId, currentSerieData.titulo, currentSerieData.sinopsis);
            } else if (currentSerieId && currentSeason !== null && currentEpisode !== null) {
                // Reproducir episodio actual
                const ep = episodiosCache[currentEpisode - 1] || { name: 'Episodio', overview: '' };
                reproducirEpisodio(currentSerieId, currentSeason, currentEpisode, ep.name, ep.overview);
            }
        }

        function siguienteFuente() {
            if (currentSerieId && !currentSeason) {
                idxFuenteActual++;
                if (idxFuenteActual >= fuentesActuales.length) {
                    fuenteInfo.textContent = '❌ No hay más fuentes.';
                    return;
                }
                probarSiguienteFuente(currentSerieId, 'movie');
            } else if (currentSerieId && currentSeason !== null && currentEpisode !== null) {
                idxFuenteActual++;
                if (idxFuenteActual >= fuentesActuales.length) {
                    fuenteInfo.textContent = '❌ No hay más fuentes.';
                    return;
                }
                probarSiguienteFuente(currentSerieId, 'tv', currentSeason, currentEpisode);
            }
        }

        btnCerrarReproductor.addEventListener('click', () => {
            reproductor.classList.remove('active');
            iframe.src = '';
            videoPlayer.pause();
            videoPlayer.removeAttribute('src');
            videoPlayer.style.display = 'none';
            iframe.style.display = 'block';
            loadingVideo.style.display = 'none';
            fuenteInfo.textContent = '';
            if (timeoutAuto) clearTimeout(timeoutAuto);
        });

        btnRecargar.addEventListener('click', recargar);
        btnSiguiente.addEventListener('click', siguienteFuente);
        sourceSelector.addEventListener('change', recargar);

        // ================================================================
        // BUSCAR
        // ================================================================
        async function buscar(query) {
            if (!query.trim()) {
                modoBusqueda = false;
                tituloSeccion.innerHTML = `📌 Populares <span class="badge">🔥</span>`;
                verTodo.style.display = 'inline-block';
                loaderInfinito.style.display = 'block';
                await cargarPagina(1);
                return;
            }

            // Si el usuario busca "canal" o "tv" mostrar canales
            if (query.toLowerCase().includes('canal') || query.toLowerCase().includes('tv')) {
                currentTipo = 'canales';
                cargarCanalesTV();
                return;
            }

            modoBusqueda = true;
            verTodo.style.display = 'none';
            loaderInfinito.style.display = 'none';
            tituloSeccion.innerHTML = `🔍 "${query}" <span class="result-count">Buscando...</span>`;
            try {
                let data;
                const tipo = currentTipo;
                if (tipo === 'movie') {
                    data = await fetchApi('search/movie', `query=${encodeURIComponent(query)}&page=1`);
                } else if (tipo === 'espanol') {
                    data = await fetchApi('search/movie', `query=${encodeURIComponent(query)}&page=1`);
                    data.results = (data.results || []).filter(item => item.original_language === 'es' || item.original_language === 'la');
                } else if (tipo === 'tv') {
                    data = await fetchApi('search/tv', `query=${encodeURIComponent(query)}&page=1`);
                } else if (tipo === 'tv_es') {
                    data = await fetchApi('search/tv', `query=${encodeURIComponent(query)}&page=1`);
                    data.results = (data.results || []).filter(item => item.original_language === 'es' || item.original_language === 'la');
                } else if (tipo === 'anime') {
                    data = await fetchApi('search/tv', `query=${encodeURIComponent(query)}&page=1`);
                    data.results = (data.results || []).filter(item => item.genre_ids && item.genre_ids.includes(16));
                } else {
                    data = await fetchApi('search/multi', `query=${encodeURIComponent(query)}&page=1`);
                }
                const results = data.results || [];
                tituloSeccion.innerHTML = `🔍 "${query}" <span class="result-count">${results.length} encontrados</span>`;
                renderGrid(results);
                actualizarHero(results);
            } catch (e) {
                tituloSeccion.innerHTML = '❌ Error al buscar';
                grid.innerHTML = `<p style="color:#e50914;text-align:center;padding:30px;">Error: ${e.message}</p>`;
            }
        }

        // ================================================================
        // CARGAR TEMPORADAS Y EPISODIOS (SERIES)
        // ================================================================
        let episodiosCache = [];

        async function cargarTemporadas(serieId, titulo, sinopsis) {
            currentSerieId = serieId;
            currentSerieData = { titulo, sinopsis };
            grid.style.display = 'none';
            verTodo.style.display = 'none';
            loaderInfinito.style.display = 'none';
            tituloSeccion.innerHTML = `📺 ${titulo} <span class="badge">Temporadas</span>`;

            try {
                const data = await fetchApi(`tv/${serieId}`);
                const temporadas = (data.seasons || []).filter(t => t.episode_count > 0);
                temporadas.sort((a, b) => a.season_number - b.season_number);

                if (temporadas.length === 0) {
                    grid.innerHTML = `<p style="color:rgba(255,255,255,0.1);text-align:center;padding:30px;">No hay temporadas.</p>`;
                    grid.style.display = 'grid';
                    return;
                }

                // Mostrar temporadas como botones
                let html = `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">`;
                temporadas.forEach((t, idx) => {
                    html += `<button class="temp-btn" data-season="${t.season_number}" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.3);padding:8px 20px;border-radius:40px;font-size:0.8rem;font-weight:600;cursor:pointer;transition:0.3s;">T${t.season_number}</button>`;
                });
                html += `</div>`;
                html += `<div id="episodiosContainer" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;"></div>`;
                grid.innerHTML = html;
                grid.style.display = 'grid';

                // Seleccionar primera temporada
                const primeraTemp = temporadas[0].season_number;
                cargarEpisodios(serieId, primeraTemp);

                // Eventos de temporadas
                document.querySelectorAll('.temp-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.temp-btn').forEach(b => b.style.background = 'rgba(255,255,255,0.03)');
                        btn.style.background = 'rgba(229,9,20,0.15)';
                        const season = parseInt(btn.dataset.season);
                        cargarEpisodios(serieId, season);
                    });
                });

            } catch (e) {
                console.error(e);
                grid.innerHTML = `<p style="color:#e50914;text-align:center;padding:30px;">❌ Error: ${e.message}</p>`;
                grid.style.display = 'grid';
            }
        }

        async function cargarEpisodios(serieId, season) {
            try {
                const data = await fetchApi(`tv/${serieId}/season/${season}`);
                const episodios = data.episodes || [];
                episodiosCache = episodios;
                const container = document.getElementById('episodiosContainer');
                if (!container) return;

                if (episodios.length === 0) {
                    container.innerHTML = `<p style="color:rgba(255,255,255,0.1);padding:20px;">No hay episodios.</p>`;
                    return;
                }

                container.innerHTML = episodios.map(ep => `
                    <div class="ep-card" data-episodio="${ep.episode_number}" data-titulo="${ep.name || 'Ep ' + ep.episode_number}" data-sinopsis="${ep.overview || ''}" style="background:rgba(255,255,255,0.02);border-radius:16px;padding:16px;text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,0.03);transition:0.3s;">
                        <div style="font-size:1.4rem;font-weight:800;color:#e50914;">${ep.episode_number}</div>
                        <div style="font-size:0.6rem;color:rgba(255,255,255,0.2);margin-top:4px;">${ep.name || 'Ep ' + ep.episode_number}</div>
                    </div>
                `).join('');

                document.querySelectorAll('.ep-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const epNum = parseInt(card.dataset.episodio);
                        const epTitulo = card.dataset.titulo;
                        const epSinopsis = card.dataset.sinopsis;
                        // Reproducir episodio
                        reproducirEpisodio(serieId, season, epNum, epTitulo, epSinopsis);
                    });
                });

            } catch (e) {
                console.error(e);
            }
        }

        function reproducirEpisodio(serieId, season, episode, titulo, sinopsis) {
            currentSerieId = serieId;
            currentSeason = season;
            currentEpisode = episode;
            currentSerieData = currentSerieData || { titulo: 'Serie', sinopsis: '' };
            currentTipo = document.querySelector('.nav-tab.active')?.dataset?.tipo || 'tv';

            const nombre = `${currentSerieData.titulo} - T${season}E${episode}`;
            peliTitulo.textContent = nombre;
            peliSinopsis.textContent = sinopsis || currentSerieData.sinopsis || 'Sin sinopsis.';
            fuenteInfo.textContent = '';
            videoPlayer.style.display = 'none';
            iframe.style.display = 'block';

            reproductor.classList.add('active');
            loadingVideo.style.display = 'flex';
            loadingText.textContent = '🔍 Buscando fuente...';

            fuentesActuales = FUENTES[currentTipo] || FUENTES.tv;

            if (sourceSelector.value === 'auto') {
                buscarFuenteAuto(serieId, 'tv', season, episode);
            } else {
                const dominio = sourceSelector.value;
                const url = `https://${dominio}/embed/tv/${serieId}/${season}/${episode}`;
                iframe.src = url;
                fuenteInfo.textContent = `🔧 Fuente: ${dominio}`;
                loadingVideo.style.display = 'none';
            }
            reproductor.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ================================================================
        // SCROLL INFINITO (carga automática al hacer scroll)
        // ================================================================
        let cargandoScroll = false;
        window.addEventListener('scroll', () => {
            const loader = document.getElementById('loaderInfinito');
            if (!loader || loader.style.display === 'none') return;
            const rect = loader.getBoundingClientRect();
            if (rect.top < window.innerHeight + 100 && !cargandoScroll && !modoBusqueda && currentTipo !== 'canales') {
                cargandoScroll = true;
                if (currentPage < MAX_PAGES) {
                    currentPage++;
                    cargarPagina(currentPage).then(() => {
                        cargandoScroll = false;
                    }).catch(() => {
                        cargandoScroll = false;
                    });
                } else {
                    loader.textContent = '🏁 Has llegado al final';
                    loader.style.color = 'rgba(255,255,255,0.05)';
                }
            }
        });

        // ================================================================
        // NAV TABS
        // ================================================================
        navTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                navTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTipo = tab.dataset.tipo;
                currentPage = 1;
                modoBusqueda = false;
                grid.style.display = 'grid';
                verTodo.style.display = 'inline-block';
                loaderInfinito.style.display = 'block';
                tituloSeccion.innerHTML = `📌 Populares <span class="badge">🔥</span>`;
                buscador.value = '';
                if (currentTipo === 'canales') {
                    cargarCanalesTV();
                } else {
                    cargarPagina(1);
                }
            });
        });

        // ================================================================
        // VER TODO
        // ================================================================
        verTodo.addEventListener('click', () => {
            if (currentTipo === 'canales') return;
            // Simular scroll para cargar más
            window.scrollTo(0, document.body.scrollHeight);
        });

        // ================================================================
        // BUSCADOR
        // ================================================================
        btnBuscar.addEventListener('click', () => {
            const query = buscador.value.trim();
            if (query) buscar(query);
        });
        buscador.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const query = buscador.value.trim();
                if (query) buscar(query);
            }
        });

        // ================================================================
        // INICIO
        // ================================================================
        cargarPagina(1);
    </script>
</body>
</html>
