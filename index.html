<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeStream · MiruroAPI</title>

    <!-- Estilos para que se vea bonito y sea responsive -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0b0f1a;
            color: #e2e8f0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #1e293b;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f472b6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .search-box {
            display: flex;
            gap: 10px;
            flex: 1;
            max-width: 500px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            background: #1e293b;
            color: #f1f5f9;
            outline: 2px solid transparent;
            transition: 0.2s;
        }
        .search-box input:focus {
            outline-color: #a78bfa;
        }
        .search-box button {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            background: #a78bfa;
            color: #0b0f1a;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-box button:hover {
            background: #8b5cf6;
            transform: scale(1.02);
        }
        .status {
            margin: 15px 0 25px;
            padding: 12px;
            border-radius: 10px;
            background: #1e293b;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }
        .anime-card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        .anime-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 20px -8px rgba(167, 139, 250, 0.3);
        }
        .anime-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: #0f172a;
        }
        .anime-card .info {
            padding: 16px;
        }
        .anime-card .info h3 {
            font-size: 16px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .anime-card .info p {
            font-size: 13px;
            color: #94a3b8;
        }

        /* Modal (reproductor y lista de episodios) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #0f172a;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            border-radius: 20px;
            padding: 25px;
            overflow-y: auto;
            position: relative;
            border: 1px solid #1e293b;
        }
        .modal-close {
            position: sticky;
            top: 0;
            float: right;
            font-size: 28px;
            color: #94a3b8;
            cursor: pointer;
            background: #0f172a;
            padding: 0 8px;
            border-radius: 50%;
            line-height: 1;
            z-index: 10;
        }
        .modal-close:hover {
            color: #f1f5f9;
        }
        .modal-title {
            font-size: 24px;
            margin-bottom: 20px;
            padding-right: 40px;
        }
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }
        .episode-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px 0;
        }
        .episode-btn {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 14px;
        }
        .episode-btn:hover {
            background: #334155;
            border-color: #a78bfa;
        }
        .episode-btn.active {
            background: #a78bfa;
            color: #0b0f1a;
            border-color: #a78bfa;
            font-weight: 600;
        }
        .loading-text {
            color: #94a3b8;
            padding: 10px 0;
        }
        .error-text {
            color: #f87171;
        }

        /* Scrollbar personalizada */
        .episode-list::-webkit-scrollbar {
            width: 6px;
        }
        .episode-list::-webkit-scrollbar-track {
            background: #0f172a;
        }
        .episode-list::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                max-width: 100%;
            }
            .anime-grid {
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
            .anime-card img {
                height: 200px;
            }
        }
        @media (max-width: 420px) {
            .anime-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <header>
            <div class="logo">🎬 AnimeStream</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Busca tu anime... (ej: Naruto)" />
                <button onclick="searchAnime()">Buscar</button>
            </div>
        </header>

        <!-- ESTADO -->
        <div class="status" id="status">🔍 Escribe el nombre de un anime y presiona "Buscar".</div>

        <!-- GRID DE ANIMES -->
        <div class="anime-grid" id="animeGrid"></div>

    </div>

    <!-- MODAL REPRODUCTOR -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 class="modal-title" id="modalTitle">Título del Anime</h2>

            <div class="video-container">
                <video id="videoPlayer" controls preload="metadata" playsinline></video>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <strong>📺 Episodios:</strong>
                <span id="episodeCount" style="font-size: 14px; color: #94a3b8;"></span>
            </div>
            <div class="episode-list" id="episodeList">
                <span class="loading-text">Cargando episodios...</span>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  1.  CONFIGURACIÓN DE LA API
        // ============================================================
        const API_BASE = 'https://miruro-api-roan.vercel.app/api';

        // ============================================================
        //  2.  REFERENCIAS A ELEMENTOS DEL DOM
        // ============================================================
        const searchInput = document.getElementById('searchInput');
        const statusDiv = document.getElementById('status');
        const grid = document.getElementById('animeGrid');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const episodeList = document.getElementById('episodeList');
        const episodeCount = document.getElementById('episodeCount');
        const videoPlayer = document.getElementById('videoPlayer');

        let currentAnimeId = null;
        let currentEpisodes = [];
        let currentEpisodeIndex = 0;

        // ============================================================
        //  3.  FUNCIONES PRINCIPALES
        // ============================================================

        // ----- 3.1 Buscar animes -----
        async function searchAnime() {
            const query = searchInput.value.trim();
            if (!query) {
                setStatus('⚠️ Escribe el nombre de un anime.', true);
                return;
            }

            setStatus(`⏳ Buscando "${query}"...`);
            grid.innerHTML = '';

            try {
                const url = `${API_BASE}/search?query=${encodeURIComponent(query)}&per_page=20`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }

                const data = await response.json();

                if (!data.success || !data.results || data.results.results.length === 0) {
                    setStatus(`❌ No se encontraron resultados para "${query}".`, true);
                    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#94a3b8;">No se encontraron animes.</div>`;
                    return;
                }

                const animes = data.results.results;
                setStatus(`✅ ${animes.length} resultados encontrados. Haz clic en una tarjeta para ver los episodios.`);
                renderAnimeGrid(animes);

            } catch (error) {
                console.error('Error en búsqueda:', error);
                setStatus('❌ Error de conexión con la API. Intenta de nuevo más tarde.', true);
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#f87171;">⚠️ No se pudo conectar con el servidor.</div>`;
            }
        }

        // ----- 3.2 Renderizar grid de animes -----
        function renderAnimeGrid(animes) {
            grid.innerHTML = animes.map(anime => {
                const title = anime.title?.romaji || anime.title?.english || 'Sin título';
                const image = anime.coverImage?.large || anime.coverImage?.medium || '';
                const year = anime.seasonYear || 'Año desconocido';
                return `
                    <div class="anime-card" onclick="openAnime(${anime.id}, '${title.replace(/'/g, "\\'")}')">
                        <img src="${image}" alt="${title}" loading="lazy"
                             onerror="this.src='https://via.placeholder.com/200x280/1e293b/94a3b8?text=${encodeURIComponent(title)}'" />
                        <div class="info">
                            <h3>${title}</h3>
                            <p>${year}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ----- 3.3 Abrir modal y cargar episodios -----
        async function openAnime(animeId, title) {
            currentAnimeId = animeId;
            modalTitle.textContent = title;
            modal.classList.add('active');
            episodeList.innerHTML = '<span class="loading-text">⏳ Cargando episodios...</span>';
            episodeCount.textContent = '';
            videoPlayer.pause();
            videoPlayer.removeAttribute('src');
            videoPlayer.load();

            try {
                const url = `${API_BASE}/episodes/${animeId}`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }

                const data = await response.json();

                if (!data.success || !data.results || data.results.length === 0) {
                    episodeList.innerHTML = '<span class="error-text">❌ No se encontraron episodios para este anime.</span>';
                    episodeCount.textContent = '0 episodios';
                    return;
                }

                currentEpisodes = data.results;
                episodeCount.textContent = `${currentEpisodes.length} episodios`;

                // Renderizar botones de episodios
                episodeList.innerHTML = currentEpisodes.map((ep, index) => {
                    const epNumber = ep.number || ep.episode || index + 1;
                    const epTitle = ep.title ? ` - ${ep.title}` : '';
                    return `
                        <button class="episode-btn" data-index="${index}" onclick="playEpisode(${index})">
                            ${epNumber}${epTitle}
                        </button>
                    `;
                }).join('');

                // Reproducir el primer episodio automáticamente
                if (currentEpisodes.length > 0) {
                    playEpisode(0);
                }

            } catch (error) {
                console.error('Error al cargar episodios:', error);
                episodeList.innerHTML = `<span class="error-text">❌ Error al cargar los episodios: ${error.message}</span>`;
                episodeCount.textContent = 'Error';
            }
        }

        // ----- 3.4 Reproducir un episodio -----
        async function playEpisode(index) {
            if (index < 0 || index >= currentEpisodes.length) return;

            currentEpisodeIndex = index;
            const episode = currentEpisodes[index];

            // Resaltar botón activo
            document.querySelectorAll('.episode-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });

            // Mostrar estado en el título del modal
            const epNum = episode.number || episode.episode || index + 1;
            modalTitle.textContent = `${document.querySelector('.modal-title').textContent.split('—')[0].trim()} — Episodio ${epNum}`;

            // Intentar obtener la URL del video
            try {
                // Intentamos con el endpoint /watch
                const watchUrl = `${API_BASE}/watch/${episode.id}`;
                const response = await fetch(watchUrl);

                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }

                const data = await response.json();

                if (!data.success || !data.results || !data.results.sources || data.results.sources.length === 0) {
                    throw new Error('No se encontraron fuentes de video.');
                }

                // Tomamos la primera fuente (suele ser la de mejor calidad)
                const source = data.results.sources[0];
                const videoUrl = source.url;

                if (!videoUrl) {
                    throw new Error('La URL del video está vacía.');
                }

                // Cargar el video en el reproductor
                videoPlayer.src = videoUrl;
                videoPlayer.load();
                videoPlayer.play().catch(err => {
                    console.warn('Autoplay bloqueado:', err);
                });

                setStatus(`▶️ Reproduciendo episodio ${epNum} de ${currentEpisodes.length}`);

            } catch (error) {
                console.error('Error al obtener el video:', error);
                // Si falla, mostramos un mensaje en el reproductor
                videoPlayer.src = '';
                videoPlayer.load();
                alert(`No se pudo cargar el video del episodio ${epNum}. Error: ${error.message}`);
                setStatus(`❌ Error al cargar el episodio ${epNum}`, true);
            }
        }

        // ----- 3.5 Cerrar modal -----
        function closeModal() {
            modal.classList.remove('active');
            videoPlayer.pause();
            videoPlayer.removeAttribute('src');
            videoPlayer.load();
            currentEpisodes = [];
            currentAnimeId = null;
            setStatus('🔍 Busca otro anime para continuar.');
        }

        // ----- 3.6 Actualizar el estado -----
        function setStatus(message, isError = false) {
            statusDiv.textContent = message;
            statusDiv.style.color = isError ? '#f87171' : '#94a3b8';
        }

        // ============================================================
        //  4.  EVENTOS Y CONFIGURACIÓN INICIAL
        // ============================================================

        // Buscar al presionar Enter
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchAnime();
        });

        // Cerrar modal con ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Cerrar modal al hacer clic fuera del contenido
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Mensaje de bienvenida
        window.onload = () => {
            grid.innerHTML = `
                <div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:#64748b;">
                    <h2 style="font-weight:400; margin-bottom:10px;">🌟 Busca tu anime favorito</h2>
                    <p style="font-size:15px;">Escribe el nombre en el campo de búsqueda y presiona "Buscar".</p>
                </div>
            `;
            setStatus('🔍 Escribe el nombre de un anime y presiona "Buscar".');
        };
    </script>

</body>
</html>
