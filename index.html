<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎬 Mi Cine - Tendencias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            padding: 12px;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e50914, #b20710);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span {
            background: none;
            -webkit-text-fill-color: #888;
            font-weight: 300;
            font-size: 0.8rem;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            border-radius: 30px;
            padding: 5px 15px;
            border: 1px solid #2a2a2a;
            width: 100%;
            max-width: 280px;
        }
        .search-box input {
            background: transparent;
            border: none;
            padding: 10px 0;
            color: #fff;
            font-size: 0.95rem;
            width: 100%;
            outline: none;
        }
        .search-box input::placeholder {
            color: #666;
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 15px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 10px;
            margin-bottom: 15px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .tab {
            background: none;
            border: none;
            color: #888;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 0;
            transition: 0.3s;
            position: relative;
            flex-shrink: 0;
        }
        .tab.active {
            color: #fff;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #e50914;
            border-radius: 4px;
        }

        /* FILTROS */
        .filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            align-items: center;
        }
        .filter-label {
            color: #888;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-right: 4px;
        }
        .filter-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 3px 12px;
            border-radius: 20px;
            transition: 0.3s;
        }
        .filter-btn.active {
            color: #fff;
            background: #e50914;
        }
        .filter-btn:hover {
            color: #fff;
            background: #1a1a1a;
        }

        /* GRID RECOMENDADOS */
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 18px 0 12px;
        }
        .grid-recom {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        .card-rec {
            background: #141414;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid #1a1a1a;
        }
        .card-rec:active {
            transform: scale(0.96);
        }
        .card-rec img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }
        .card-rec .info {
            padding: 8px 10px;
        }
        .card-rec .info h4 {
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-rec .info p {
            color: #888;
            font-size: 0.7rem;
        }

        /* LISTA TENDENCIAS */
        .trending-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }
        .trend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #111;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            transition: 0.2s;
        }
        .trend-item:active {
            background: #1a1a1a;
            transform: scale(0.98);
        }
        .trend-rank {
            font-size: 1.4rem;
            font-weight: 800;
            color: #333;
            min-width: 35px;
            text-align: center;
        }
        .trend-rank.top1 { color: #f5c518; }
        .trend-rank.top2 { color: #ccc; }
        .trend-rank.top3 { color: #cd7f32; }
        .trend-info {
            flex: 1;
            overflow: hidden;
        }
        .trend-info h4 {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .trend-info .meta {
            display: flex;
            gap: 8px;
            font-size: 0.7rem;
            color: #888;
            flex-wrap: wrap;
        }
        .trend-info .meta .date { color: #666; }
        .trend-info .meta .genre { color: #e50914; }

        /* REPRODUCTOR */
        .reproductor {
            display: none;
            margin-top: 20px;
            background: #0d0d0d;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }
        .reproductor.active {
            display: block;
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #111;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid #1a1a1a;
        }
        .btn-volver {
            background: none;
            border: none;
            color: #e50914;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }
        .player-controls {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .player-controls button {
            background: #1a1a1a;
            border: none;
            color: #ccc;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }
        .player-controls .highlight {
            background: #e50914;
            color: #fff;
        }
        .player-video {
            width: 100%;
            height: 45vh;
            min-height: 220px;
            background: #000;
        }
        .player-video iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .player-footer {
            padding: 12px 16px;
            background: #111;
            border-top: 1px solid #1a1a1a;
        }
        .player-footer .info h3 {
            font-size: 1rem;
            margin-bottom: 2px;
        }
        .player-footer .info p {
            color: #888;
            font-size: 0.8rem;
        }

        /* SELECTOR DE FUENTE */
        .source-selector {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-left: 6px;
        }

        @media (max-width: 480px) {
            .grid-recom {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 8px;
            }
            .logo {
                font-size: 1.4rem;
            }
            .search-box {
                max-width: 180px;
            }
            .tabs {
                gap: 10px;
            }
            .trend-item {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">🎬 Mi Cine <span>| Tendencias</span></div>
        <div class="search-box">
            <input id="buscador" type="text" placeholder="Buscar...">
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs" id="tabsContainer">
        <button class="tab active" data-tab="all">Todo</button>
        <button class="tab" data-tab="movie">Películas</button>
        <button class="tab" data-tab="tv">Series</button>
        <button class="tab" data-tab="anime">Anime</button>
    </div>

    <!-- FILTROS -->
    <div class="filter-row">
        <span class="filter-label">Género</span>
        <button class="filter-btn active" data-genre="all">Recomendados</button>
        <button class="filter-btn" data-genre="28">Acción</button>
        <button class="filter-btn" data-genre="35">Comedia</button>
        <button class="filter-btn" data-genre="18">Drama</button>
        <button class="filter-btn" data-genre="16">Animación</button>
        <button class="filter-btn" data-genre="10751">Niños</button>
    </div>

    <div class="filter-row">
        <span class="filter-label">Año</span>
        <button class="filter-btn active" data-year="all">Todo</button>
        <button class="filter-btn" data-year="2026">2026</button>
        <button class="filter-btn" data-year="2025">2025</button>
        <button class="filter-btn" data-year="2024">2024</button>
    </div>

    <!-- CONTENIDO -->
    <div class="section-title">📌 Recomendados</div>
    <div class="grid-recom" id="gridRecom"></div>

    <div class="section-title" style="margin-top:20px;">🔥 Tendencias</div>
    <div class="trending-list" id="trendingList"></div>

    <!-- REPRODUCTOR -->
    <div id="reproductor" class="reproductor">
        <div class="player-header">
            <div class="left">
                <button class="btn-volver" id="btnCerrarReproductor">← Volver</button>
                <span style="color:#888; font-size:0.7rem;">|</span>
                <span style="color:#e50914; font-weight:600;">Nube</span>
                <select id="sourceSelector" class="source-selector">
                    <option value="vidsrc.xyz">vidsrc.xyz</option>
                    <option value="embed.su">embed.su</option>
                    <option value="vidsrc.cc">vidsrc.cc</option>
                    <option value="vidsrc.vip">vidsrc.vip</option>
                    <option value="vidsrc.in">vidsrc.in</option>
                </select>
            </div>
            <div class="player-controls">
                <button class="highlight">HD</button>
            </div>
        </div>
        <div class="player-video">
            <iframe id="iframeVideo" src="" allowfullscreen allow="encrypted-media; fullscreen"></iframe>
        </div>
        <div class="player-footer">
            <div class="info">
                <h3 id="peliTitulo">Título</h3>
                <p id="peliSinopsis">Sinopsis aquí...</p>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  TU CLAVE DE TMDb (colócala aquí)
        // ============================================================
        const API_KEY = 'bda7a5fa2507ebcef3fcebd2287d72c9';
        const BASE_IMG = 'https://image.tmdb.org/t/p/w300';

        // DOM
        const gridRecom = document.getElementById('gridRecom');
        const trendingList = document.getElementById('trendingList');
        const reproductor = document.getElementById('reproductor');
        const iframe = document.getElementById('iframeVideo');
        const peliTitulo = document.getElementById('peliTitulo');
        const peliSinopsis = document.getElementById('peliSinopsis');
        const buscador = document.getElementById('buscador');
        const sourceSelector = document.getElementById('sourceSelector');

        let allMovies = [];
        let allTrending = [];
        let currentYear = 'all';

        // ============================================================
        //  API
        // ============================================================
        async function fetchApi(endpoint) {
            const url = `https://api.themoviedb.org/3/${endpoint}?api_key=${API_KEY}&language=es-MX`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Error ${res.status}`);
            return res.json();
        }

        // Cargar películas populares (para recomendados)
        async function loadPopular() {
            try {
                const data = await fetchApi('movie/popular');
                allMovies = data.results || [];
                renderGrid(allMovies);
            } catch (e) {
                gridRecom.innerHTML = `<p style="color:#e50914;">Error: ${e.message}</p>`;
            }
        }

        // Cargar tendencias
        async function loadTrending() {
            try {
                const data = await fetchApi('trending/movie/week');
                allTrending = data.results || [];
                renderTrending(allTrending);
            } catch (e) {
                trendingList.innerHTML = `<p style="color:#e50914;">Error al cargar tendencias</p>`;
            }
        }

        // ============================================================
        //  RENDER
        // ============================================================
        function renderGrid(lista) {
            let filtered = lista;
            if (currentYear !== 'all') {
                filtered = filtered.filter(item => {
                    const date = item.release_date || '';
                    return date.startsWith(currentYear);
                });
            }
            const show = filtered.slice(0, 8);

            gridRecom.innerHTML = show.map(item => `
                <div class="card-rec" data-id="${item.id}" data-titulo="${item.title}" data-sinopsis="${item.overview || 'Sin sinopsis.'}">
                    <img src="${item.poster_path ? BASE_IMG + item.poster_path : 'https://via.placeholder.com/300x450/222/555?text=No+Image'}" alt="${item.title}" loading="lazy">
                    <div class="info">
                        <h4>${item.title}</h4>
                        <p>⭐ ${item.vote_average?.toFixed(1) || 'N/A'}</p>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.card-rec').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.dataset.id;
                    const titulo = card.dataset.titulo;
                    const sinopsis = card.dataset.sinopsis;
                    abrirReproductor(id, titulo, sinopsis);
                });
            });
        }

        function renderTrending(lista) {
            const top10 = lista.slice(0, 10);
            trendingList.innerHTML = top10.map((item, index) => {
                const rank = index + 1;
                let rankClass = 'trend-rank';
                if (rank === 1) rankClass += ' top1';
                else if (rank === 2) rankClass += ' top2';
                else if (rank === 3) rankClass += ' top3';

                const date = item.release_date || '2026-TBC';
                const genreIds = item.genre_ids || [];
                const genreMap = { 28: 'Acción', 12: 'Aventura', 16: 'Animación', 35: 'Comedia', 18: 'Drama', 10751: 'Niños', 14: 'Fantasía' };
                const genreName = genreMap[genreIds[0]] || 'Anime';

                return `
                    <div class="trend-item" data-id="${item.id}" data-titulo="${item.title}" data-sinopsis="${item.overview || 'Sin sinopsis.'}">
                        <div class="${rankClass}">${rank}</div>
                        <div class="trend-info">
                            <h4>${item.title}</h4>
                            <div class="meta">
                                <span class="date">${date}</span>
                                <span class="genre">${genreName}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.trend-item').forEach(item => {
                item.addEventListener('click', () => {
                    const id = item.dataset.id;
                    const titulo = item.dataset.titulo;
                    const sinopsis = item.dataset.sinopsis;
                    abrirReproductor(id, titulo, sinopsis);
                });
            });
        }

        // ============================================================
        //  REPRODUCTOR (con selector de fuente)
        // ============================================================
        function abrirReproductor(id, titulo, sinopsis, type = 'movie') {
            const domain = sourceSelector.value;
            const videoSrc = `https://${domain}/embed/${type}/${id}`;
            iframe.src = videoSrc;
            peliTitulo.textContent = titulo;
            peliSinopsis.textContent = sinopsis;
            reproductor.classList.add('active');
            reproductor.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        document.getElementById('btnCerrarReproductor').addEventListener('click', () => {
            reproductor.classList.remove('active');
            iframe.src = '';
        });

        // Cambiar fuente y recargar automáticamente
        sourceSelector.addEventListener('change', () => {
            const currentSrc = iframe.src;
            if (currentSrc) {
                const url = new URL(currentSrc);
                const pathParts = url.pathname.split('/');
                const type = pathParts[1] || 'movie';
                const id = pathParts[2];
                if (id) {
                    const newSrc = `https://${sourceSelector.value}/embed/${type}/${id}`;
                    iframe.src = newSrc;
                }
            }
        });

        // ============================================================
        //  BUSCADOR
        // ============================================================
        buscador.addEventListener('input', (e) => {
            const texto = e.target.value.toLowerCase().trim();
            if (!texto) {
                renderGrid(allMovies);
                renderTrending(allTrending);
                return;
            }
            const filtradas = allMovies.filter(item => {
                const title = (item.title || '').toLowerCase();
                return title.includes(texto);
            });
            renderGrid(filtradas);
            const filtradasTrend = allTrending.filter(item => {
                const title = (item.title || '').toLowerCase();
                return title.includes(texto);
            });
            renderTrending(filtradasTrend);
        });

        // ============================================================
        //  FILTROS
        // ============================================================
        document.querySelectorAll('.filter-btn[data-year]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn[data-year]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentYear = btn.dataset.year;
                renderGrid(allMovies);
            });
        });

        // Filtros de género (solo UI)
        document.querySelectorAll('.filter-btn[data-genre]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn[data-genre]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // En una versión completa, filtraríamos por género aquí
            });
        });

        // Tabs
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                // Cambiar categoría (solo UI)
            });
        });

        // ============================================================
        //  INICIO
        // ============================================================
        loadPopular();
        loadTrending();
    </script>

</body>
</html>
